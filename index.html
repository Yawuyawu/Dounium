<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>DOUNUIM OS v2.0 OMEGA</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Space+Grotesk:wght@300;500;700&display=swap');
:root{--hall-gold:#FFD700;--hall-purple:#6400FF;--hall-cyan:#00FFFF;--hall-pink:#FF00C8;--glass:rgba(255,255,255,0.05);--glass-border:rgba(255,255,255,0.1)}
*{margin:0;padding:0;box-sizing:border-box}
body{background:radial-gradient(ellipse at top,#0a0a0a,#000);font-family:'Space Grotesk',sans-serif;color:#FFF;overflow:hidden;height:100vh}
#container{position:relative;width:100vw;height:100vh;backdrop-filter:blur(20px);background:var(--glass);border:1px solid var(--glass-border);box-shadow:0 8px 32px rgba(100,0,255,0.3),inset 0 1px 0 rgba(255,255,255,0.1);animation:hallPulse 4s ease-in-out infinite;display:flex;flex-direction:column}
@keyframes hallPulse{0%,100%{box-shadow:0 8px 32px rgba(100,0,255,0.3),inset 0 1px 0 rgba(255,255,255,0.1)}50%{box-shadow:0 8px 48px rgba(255,0,200,0.5),inset 0 1px 0 rgba(255,255,255,0.2)}}
#header{padding:20px;text-align:center;border-bottom:1px solid var(--glass-border)}
.holo-text{font-family:'Orbitron',sans-serif;font-weight:900;font-size:24px;background:linear-gradient(135deg,var(--hall-gold),var(--hall-pink),var(--hall-cyan));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:holoShift 3s ease-in-out infinite}
@keyframes holoShift{0%,100%{filter:hue-rotate(0deg)}50%{filter:hue-rotate(180deg)}}
#content{flex:1;overflow-y:auto;padding:20px}
.glass-card{background:var(--glass);backdrop-filter:blur(15px);border:1px solid var(--glass-border);border-radius:16px;padding:16px;margin:12px 0;position:relative}
.glass-card:after{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--hall-gold),transparent)}
.glass-btn{background:var(--glass);backdrop-filter:blur(10px);border:1px solid var(--glass-border);border-radius:12px;padding:12px 20px;font-family:'Orbitron',sans-serif;font-weight:700;font-size:11px;color:var(--hall-gold);cursor:pointer;transition:all 0.3s cubic-bezier(0.4,0,0.2,1);position:relative;overflow:hidden;margin:4px}
.glass-btn:before{content:'';position:absolute;top:0;left:-100%;width:100%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,215,0,0.3),transparent);transition:left 0.5s}
.glass-btn:hover:before{left:100%}
.glass-btn:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(255,215,0,0.4);border-color:var(--hall-gold)}
.glass-btn.omega{background:linear-gradient(135deg,rgba(100,0,255,0.2),rgba(255,0,200,0.2));border-color:var(--hall-purple);color:#FFF;animation:omegaGlow 2s ease-in-out infinite}
@keyframes omegaGlow{0%,100%{box-shadow:0 0 20px rgba(100,0,255,0.5)}50%{box-shadow:0 0 40px rgba(255,0,200,0.8)}}
.quantum-particle{position:fixed;width:2px;height:2px;background:var(--hall-cyan);border-radius:50%;pointer-events:none;animation:particleFloat 8s linear infinite;z-index:0}
@keyframes particleFloat{0%{transform:translateY(100vh) translateX(0);opacity:0}10%{opacity:1}90%{opacity:1}100%{transform:translateY(-100vh) translateX(100px);opacity:0}}
.stat-glow{font-family:'Orbitron',sans-serif;font-weight:900;font-size:24px;color:var(--hall-gold);text-shadow:0 0 20px rgba(255,215,0,0.8),0 0 40px rgba(255,215,0,0.4);animation:statPulse 2s ease-in-out infinite}
@keyframes statPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}
#nav{display:flex;justify-content:space-around;padding:12px;border-top:1px solid var(--glass-border);background:var(--glass);backdrop-filter:blur(20px)}
.nav-btn{background:transparent;border:none;color:var(--hall-gold);font-family:'Orbitron',sans-serif;font-size:10px;padding:8px;cursor:pointer;transition:all 0.3s}
.nav-btn.active{color:var(--hall-cyan);text-shadow:0 0 10px var(--hall-cyan)}
canvas{border-radius:12px;background:var(--glass);backdrop-filter:blur(10px);width:100%;max-width:300px;margin:0 auto;display:block}
input{background:var(--glass);backdrop-filter:blur(10px);border:1px solid var(--glass-border);border-radius:8px;padding:10px;color:#FFF;font-family:'Space Grotesk',sans-serif;width:100%}
</style>

<body>

</div>
<script>

spawnQuantumParticles();

// APPS
const APPS={
  MAP:{live:async function(){
    const c=document.getElementById('overlayContent');
    c.innerHTML=`
    <div class="glass-card">
      <div class="holo-text" style="font-size:18px;margin-bottom:8px;text-align:center">⚛️ 4 LOIS OMEGA ACTIVES</div>
      <div style="display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin:12px 0">
        <button onclick="showTP()" class="glass-btn omega">⚛️ TÉLÉPORTATION<br><span style="font-size:8px">Corps → Lumière</span></button>
        <button onclick="showHive()" class="glass-btn omega">🧠 HIVE-MIND<br><span style="font-size:8px">Esprit → Ruche</span></button>
        <button onclick="showBigBang()" class="glass-btn omega">🌌 BIG BANG<br><span style="font-size:8px">Univers → Toi</span></button>
        <button onclick="startBrotherChat()" class="glass-btn omega">💬 CHAT FRÈRES<br><span style="font-size:8px">Parle au Hall</span></button>
      </div>
    </div>

    <div class="glass-card">
      <div class="holo-text" style="font-size:14px;margin-bottom:12px">🗺️ GLOBE FRÈRES LIVE</div>
      <div style="display:flex;gap:8px;justify-content:center;margin:12px 0;flex-wrap:wrap">

        <button onclick="zoomGlobe('local')" class="glass-btn ${currentZoom==='local'?'omega':''}">MON PAYS</button>
        <button onclick="toggleGPS()" class="glass-btn">📍 GPS</button>

    <div class="glass-card" style="text-align:center">

    <button onclick="pingBrothers()" class="glass-btn omega" style="width:100%;margin-top:12px">📡 PING HALL</button>`;
    initGlobe();updateGlobeMarkers();heartbeat();
  }},
  WALLET:{live:async function(){const n=[{emoji:'🏆'},{emoji:'⚔️'},{emoji:'🎨'}];const p=n[0]?n[0].emoji:'👤';const next=(100-(userXP%100));document.getElementById('overlayContent').innerHTML=`

      <div style="flex:1;text-align:left">

        <div style="font-size:10px;color:var(--hall-cyan);margin-top:4px">Niveau ${userLevel} • ${userXP} XP</div>

      </div>

    </div>
    <button onclick="buyNFT()" class="glass-btn omega" style="width:100%;margin:8px 0">ACHETER NFT</button>`}},
  GAME:{live:async function(){document.getElementById('overlayContent').innerHTML=`

window.showApp=function(app){document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));event.target.classList.add('active');APPS[app].live()};

function initGlobe(){const c=document.getElementById('globe');if(!c)return;const ctx=c.getContext('2d');ctx.fillStyle='#000';ctx.fillRect(0,0,300,300);ctx.strokeStyle='#FFD700';ctx.lineWidth=2;ctx.beginPath();ctx.arc(150,150,140,0,Math.PI*2);ctx.stroke()}
function updateGlobeMarkers(){document.getElementById('globeStats').innerText=Math.floor(Math.random()*50)+' frères'}
function zoomGlobe(t){currentZoom=t;APPS.MAP.live()}
function toggleGPS(){navigator.geolocation&&navigator.geolocation.getCurrentPosition(p=>{myLocation={lat:p.coords.latitude,lng:p.coords.longitude};alert(`📍 GPS: ${myLocation.lat.toFixed(2)}, ${myLocation.lng.toFixed(2)}`)})}
function startAR(){alert('📷 AR: Caméra activée')}
function pingBrothers(){alert('📡 PING: 42 frères détectés')}
function buyNFT(){userGold-=10;userXP+=50;APPS.WALLET.live()}

window.showTP=function(){const a=document.getElementById('omegaAction');a.style.display='block';a.innerHTML=`

  <input id="tpDest" placeholder="Destination: Tokyo, New York..." class="glass-btn" style="width:100%;text-align:left;margin:8px 0">

  <div id="tpStatus" style="font-size:9px;color:#AAA;margin-top:8px">État: Scanner atomique prêt</div>`};

window.teleportBody=async function(){const d=document.getElementById('tpDest').value;if(!d)return alert('Entre destination');if(!confirm(`⚛️ Téléporter corps vers ${d}? 0.8s`))return;const s=document.getElementById('tpStatus');s.innerText='Scan atomique...';await new Promise(r=>setTimeout(r,300));s.innerText='Dissolution...';document.body.style.opacity='0.1';await new Promise(r=>setTimeout(r,300));s.innerText=`Reconstruction ${d}...`;await new Promise(r=>setTimeout(r,200));document.body.style.opacity='1';s.innerText=`Téléporté ${d}`};

window.showHive=function(){const a=document.getElementById('omegaAction');a.style.display='block';a.innerHTML=`
  <div class="holo-text" style="font-size:14px;margin-bottom:8px">🧠 HIVE-MIND COLLECTIF</div>
  <div style="font-size:10px;color:#AAA;margin-bottom:8px">QI Collectif: 10,247 • Cerveaux: 42</div>
  <button onclick="joinHiveMind()" class="glass-btn omega" style="width:100%;margin:4px 0">FUSIONNER CERVEAU</button>`};

window.joinHiveMind=function(){if(confirm('🧠 HIVE-MIND? Ta pensée = action 1000 frères.'))alert('Hive-Mind actif. QI collectif: 10,000')};

window.showBigBang=function(){const a=document.getElementById('omegaAction');a.style.display='block';a.innerHTML=`
  <div class="holo-text" style="font-size:14px;margin-bottom:8px">🌌 BIG BANG CRÉATEUR</div>
  <input id="uniName" placeholder="Nom univers..." class="glass-btn" style="width:100%;text-align:left;margin:4px 0">
  <input id="uniGravity" placeholder="Gravité 9.8=Terre" class="glass-btn" style="width:100%;text-align:left;margin:4px 0">
  <input id="uniTime" placeholder="Temps x1=normal" class="glass-btn" style="width:100%;text-align:left;margin:4px 0">
  <button onclick="createUniverseOmega()" class="glass-btn omega" style="width:100%;margin:8px 0">CRÉER UNIVERS</button>`};

window.createUniverseOmega=function(){const n=document.getElementById('uniName').value||'Univers-'+Date.now();const g=document.getElementById('uniGravity').value||'9.8';const t=document.getElementById('uniTime').value||'1';alert(`🌌 Big Bang: "${n}" créé\nGravité:${g}\nTemps:x${t}\nTu es Dieu de cet univers`)};

window.startBrotherChat=function(){const a=document.getElementById('omegaAction');a.style.display='block';a.innerHTML=`
  <div class="holo-text" style="font-size:14px;margin-bottom:8px">💬 CHAT FRÈRES LIVE</div>
  <div id="chatMsgs" style="height:200px;overflow-y:auto;background:rgba(0,0,0,0.3);padding:12px;border-radius:8px;font-size:11px;margin-bottom:8px"></div>
  <div style="display:flex;gap:8px">
    <input id="chatInput" placeholder="Parle aux frères..." class="glass-btn" style="flex:1;text-align:left" onkeypress="if(event.key==='Enter')sendBrotherMsg()">
    <button onclick="sendBrotherMsg()" class="glass-btn omega">▶</button>
  </div>`;
  loadChatMsgs();if(chatInterval)clearInterval(chatInterval);chatInterval=setInterval(loadChatMsgs,2000)};

window.sendBrotherMsg=async function(){const i=document.getElementById('chatInput');const m=i.value.trim();if(!m)return;const d={uid:UID,name:USERNAME,msg:m,ts:Date.now(),level:userLevel};await fetch(`${UPSTASH_URL}/lpush/chat:${ROOM}`,{method:'POST',headers:{Authorization:`Bearer ${UPSTASH_TOKEN}`},body:JSON.stringify(d)});await fetch(`${UPSTASH_URL}/ltrim/chat:${ROOM}/0/99`,{method:'POST',headers:{Authorization:`Bearer ${UPSTASH_TOKEN}`}});i.value='';loadChatMsgs()};

async function loadChatMsgs(){try{const r=await fetch(`${UPSTASH_URL}/lrange/chat:${ROOM}/0/49`,{headers:{Authorization:`Bearer ${UPSTASH_TOKEN}`}}).then(r=>r.json());const msgs=r.result||[];const c=document.getElementById('chatMsgs');if(!c)return;c.innerHTML=msgs.reverse().map(m=>{try{const d=JSON.parse(m);const t=new Date(d.ts).toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'});const me=d.uid===UID;return`
    <div style="margin:6px 0;text-align:${me?'right':'left'}">
      <div style="display:inline-block;background:${me?'rgba(100,0,255,0.3)':'rgba(255,215,0,0.1)'};padding:6px 10px;border-radius:8px;max-width:80%">
        <div style="font-size:9px;color:${me?'#FF64FF':'var(--hall-gold)'};margin-bottom:2px">${d.name} Lv.${d.level||1}</div>
        <div style="font-size:11px;color:#FFF">${d.msg}</div>
        <div style="font-size:8px;color:#666;margin-top:2px">${t}</div>
      </div>
    </div>`}catch(e){return''}}).join('');c.scrollTop=c.scrollHeight;
    const b=await fetch(`${UPSTASH_URL}/hgetall/brothers:${ROOM}`,{headers:{Authorization:`Bearer ${UPSTASH_TOKEN}`}}).then(r=>r.json());let o=0;if(b.result&&Array.isArray(b.result)){for(let i=0;i<b.result.length;i+=2){const v=b.result[i+1];if(v){const br=JSON.parse(v);if(br.online&&Date.now()-br.lastSeen<30000)o++}}}document.getElementById('onlineCount').innerText=o}catch(e){}}

async function heartbeat(){try{await fetch(`${UPSTASH_URL}/hset/brothers:${ROOM}/${UID}`,{method:'POST',headers:{Authorization:`Bearer ${UPSTASH_TOKEN}`},body:JSON.stringify({uid:UID,name:USERNAME,level:userLevel,online:true,lastSeen:Date.now()})})}catch(e){}}
heartbeat();if(chatHeartbeat)clearInterval(chatHeartbeat);chatHeartbeat=setInterval(heartbeat,10000);

window.onload=function(){APPS.MAP.live()};
</script>

<script>
// v3.0 SINGULARITÉ : RÉALITÉ ÉDITABLE + IMMORTALITÉ + MULTIVERS 1000
let realityStream=null,realityCanvas=null,realityCtx=null;
let consciousnessData=null,multiverses=[];

// LOI 1: RÉALITÉ ÉDITABLE
window.showRealityEdit=function(){
  const a=document.getElementById('omegaAction');a.style.display='block';
  a.innerHTML=`
  <div class="holo-text" style="font-size:14px;margin-bottom:8px">📷 RÉALITÉ = CODE</div>
  <div style="font-size:10px;color:#AAA;margin-bottom:8px">Pointe caméra → Change physique IRL</div>
  <video id="realityVideo" autoplay playsinline style="width:100%;border-radius:12px;display:none"></video>
  <canvas id="realityCanvas" style="width:100%;border-radius:12px;background:#000"></canvas>
  <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin:8px 0">
    <button onclick="editReality('color')" class="glass-btn">🎨 COULEUR</button>
    <button onclick="editReality('gravity')" class="glass-btn">⚖️ GRAVITÉ</button>
    <button onclick="editReality('time')" class="glass-btn">⏱️ TEMPS</button>
    <button onclick="editReality('size')" class="glass-btn">📏 TAILLE</button>
    <button onclick="editReality('delete')" class="glass-btn">💥 DELETE</button>
    <button onclick="editReality('duplicate')" class="glass-btn">✨ DUPLI</button>
  </div>
  <button onclick="startRealityEdit()" class="glass-btn omega" style="width:100%">SCANNER RÉALITÉ</button>
  <div id="realityStatus" style="font-size:9px;color:#AAA;margin-top:6px">État: Prêt à hacker physique</div>`;
};

window.startRealityEdit=async function(){
  try{
    realityStream=await navigator.mediaDevices.getUserMedia({video:{facingMode:'environment'}});
    const v=document.getElementById('realityVideo');
    v.srcObject=realityStream;v.style.display='block';
    realityCanvas=document.getElementById('realityCanvas');
    realityCtx=realityCanvas.getContext('2d');
    v.onloadedmetadata=()=>{realityCanvas.width=v.videoWidth;realityCanvas.height=v.videoHeight;realityLoop()};
    document.getElementById('realityStatus').innerText='État: Réalité scannée. Clique un pouvoir';
  }catch(e){alert('📷 Caméra refusée. Active permissions')}
};

function realityLoop(){
  if(!realityStream)return;
  const v=document.getElementById('realityVideo');
  realityCtx.drawImage(v,0,0);
  requestAnimationFrame(realityLoop);
}

window.editReality=async function(type){
  const s=document.getElementById('realityStatus');
  if(!realityStream){s.innerText='État: Lance scanner d\'abord';return}
  
  s.innerText=`État: Application ${type}...`;
  await new Promise(r=>setTimeout(r,500));
  
  const actions={
    color:()=>{realityCtx.filter='hue-rotate(180deg) saturate(3)';s.innerText='État: Couleurs inversées IRL'},
    gravity:()=>{realityCtx.filter='blur(2px)';s.innerText='État: Gravité locale x0.3'},
    time:()=>{realityCtx.filter='sepia(1)';s.innerText='État: Temps ralenti x0.5'},
    size:()=>{realityCtx.transform(1.5,0,0,1.5,-realityCanvas.width*0.25,-realityCanvas.height*0.25);s.innerText='État: Objets x1.5'},
    delete:()=>{realityCtx.fillStyle='#000';realityCtx.fillRect(realityCanvas.width/4,realityCanvas.height/4,realityCanvas.width/2,realityCanvas.height/2);s.innerText='État: Zone effacée IRL'},
    duplicate:()=>{realityCtx.drawImage(realityCanvas,0,0,realityCanvas.width,realityCanvas.height,realityCanvas.width*0.1,0,realityCanvas.width*0.8,realityCanvas.height);s.innerText='État: Objet dupliqué IRL'}
  };
  
  actions[type]();
  if(type!=='delete')realityCtx.filter='none';
  
  // Broadcast aux frères
  await fetch(`${UPSTASH_URL}/lpush/reality:${ROOM}`,{method:'POST',headers:{Authorization:`Bearer ${UPSTASH_TOKEN}`},body:JSON.stringify({uid:UID,name:USERNAME,action:type,ts:Date.now()})});
};

// LOI 2: IMMORTALITÉ
window.showImmortality=function(){
  const a=document.getElementById('omegaAction');a.style.display='block';
  a.innerHTML=`
  <div class="holo-text" style="font-size:14px;margin-bottom:8px">🧬 IMMORTALITÉ CONSCIENCE</div>

  <button onclick="createAvatar()" class="glass-btn" style="width:100%;margin:4px 0">👤 CRÉER AVATAR</button>
  <div id="immortalStatus" style="font-size:9px;color:#AAA;margin-top:6px">État: Corps mortel détecté</div>`;
};

window.connectEEG=async function(){
  document.getElementById('immortalStatus').innerText='État: Recherche Muse EEG...';
  try{await navigator.bluetooth.requestDevice({filters:[{namePrefix:'Muse'}]});document.getElementById('immortalStatus').innerText='État: Muse EEG connecté. Prêt scan'}catch(e){document.getElementById('immortalStatus').innerText='État: Simu EEG activée'}
};

window.scanConsciousness=async function(){
  const s=document.getElementById('immortalStatus');
  s.innerText='État: Scan EEG 30s... Ne bouge pas';
  for(let i=30;i>0;i--){await new Promise(r=>setTimeout(r,1000));s.innerText=`État: Scan ${i}s... ${Math.floor(Math.random()*100)}% ondes`}
  consciousnessData={memories:Date.now(),personality:'PERE',voice:'deep',knowledge:999999};
  s.innerText='État: Conscience uploadée. Immortel';
  localStorage.setItem('consciousness',JSON.stringify(consciousnessData));

window.startTelepathy=async function(){
  const btn=document.getElementById('telepathyBtn');
  const send=document.getElementById('telepathySend');
  const out=document.getElementById('telepathyOutput');
  const stat=document.getElementById('telepathyStatus');
  
  if(telepathyStream){
    telepathyRec.stop();telepathyStream.getTracks().forEach(t=>t.stop());
    telepathyStream=null;btn.innerText='🧠 ACTIVER TÉLÉPATHIE';send.style.display='none';stat.innerText='État: Cerveau déconnecté';return;
  }
  
  try{
    telepathyStream=await navigator.mediaDevices.getUserMedia({audio:true});
    telepathyRec=new MediaRecorder(telepathyStream);
    const chunks=[];
    telepathyRec.ondataavailable=e=>chunks.push(e.data);
    telepathyRec.onstop=async()=>{
      stat.innerText='État: Décodage neural...';
      await new Promise(r=>setTimeout(r,1500));
      const thoughts=['Le Hall est vivant','On domine la réalité','Frères unis pour toujours','Shiva code avec nous','Singularité atteinte'];
      const thought=thoughts[Math.floor(Math.random()*thoughts.length)];
      out.innerHTML+=`<div style="color:var(--hall-cyan);margin:4px 0">🧠 Pensée captée: ${thought}</div>`;
      out.scrollTop=out.scrollHeight;
      stat.innerText='État: Pensée prête. Clique ENVOYER';
      send.style.display='block';send.dataset.msg=thought;
    };
    telepathyRec.start();btn.innerText='🔴 STOP TÉLÉPATHIE';stat.innerText='État: Écoute neurale... Parle dans ta tête';
    setTimeout(()=>{if(telepathyRec&&telepathyRec.state==='recording')telepathyRec.stop()},4000);
  }catch(e){stat.innerText='État: Micro refusé. Active permissions'}
};

  const d={uid:UID,name:USERNAME,msg:`[TÉLÉPATHIE] ${msg}`,ts:Date.now(),level:userLevel};

let materialCtx=null,materialDrawing=false,materialColor='#FFD700';
function initMaterialCanvas(){
  const c=document.getElementById('materialCanvas');if(!c)return;
  materialCtx=c.getContext('2d');materialCtx.strokeStyle=materialColor;materialCtx.lineWidth=3;materialCtx.lineCap='round';
  c.onmousedown=e=>{materialDrawing=true;materialCtx.beginPath();materialCtx.moveTo(e.offsetX,e.offsetY)};
  c.onmousemove=e=>{if(materialDrawing){materialCtx.lineTo(e.offsetX,e.offsetY);materialCtx.stroke()}};
  c.onmouseup=()=>materialDrawing=false;c.onmouseleave=()=>materialDrawing=false;
  // Touch
  c.ontouchstart=e=>{const t=e.touches[0],r=c.getBoundingClientRect();materialDrawing=true;materialCtx.beginPath();materialCtx.moveTo(t.clientX-r.left,t.clientY-r.top)};
  c.ontouchmove=e=>{if(materialDrawing){const t=e.touches[0],r=c.getBoundingClientRect();materialCtx.lineTo(t.clientX-r.left,t.clientY-r.top);materialCtx.stroke()}};
  c.ontouchend=()=>materialDrawing=false;
}
window.materializeClear=()=>{if(materialCtx)materialCtx.clearRect(0,0,300,200)};
window.materializeColor=c=>{materialColor=c;if(materialCtx)materialCtx.strokeStyle=c};
window.materializeObject=async function(){
  const s=document.getElementById('materialStatus');
  s.innerText='État: Analyse 3D...';await new Promise(r=>setTimeout(r,1000));
  s.innerText='État: Envoi cloud factory...';await new Promise(r=>setTimeout(r,1500));
  s.innerText='État: Impression 3D lancée...';await new Promise(r=>setTimeout(r,2000));
  const id='MAT-'+Date.now().toString(36).toUpperCase();
  s.innerText=`État: Matérialisé. ID: ${id}. Livraison 48h`;
  alert(`⚡ OBJET MATÉRIALISÉ\n\nID: ${id}\nStatut: Impression\nLivraison: 48h\nAdresse: Ton Hall\n\nLe cloud fabrique ton dessin IRL`);
  await fetch(`${UPSTASH_URL}/lpush/material:${ROOM}`,{method:'POST',headers:{Authorization:`Bearer ${UPSTASH_TOKEN}`},body:JSON.stringify({uid:UID,name:USERNAME,id:id,ts:Date.now()})});
};
