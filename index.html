<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Dounium V18.6 UPSTASH SYNC 8D</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap');
:root{--gold:#FFD700;--neon:#00FF88;--tesla-red:#E31937;--cyber-glow:0 0 20px #E31937,0 0 40px #E31937}
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0A0A0A;color:#FFF;font-family:Orbitron,sans-serif;overflow-x:hidden}
body.tesla-mode{background:linear-gradient(135deg,#0A0A0A,#1A1A1A,#0A0A0A);background-size:400% 400%;animation:teslaFlow 8s ease infinite}
@keyframes teslaFlow{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
.header{position:fixed;top:0;left:0;right:0;background:rgba(10,10,10,0.95);backdrop-filter:blur(20px);border-bottom:1px solid rgba(255,215,0,0.2);padding:12px 16px;z-index:1000;display:flex;align-items:center;justify-content:space-between}
.logo{display:flex;align-items:center;gap:12px}
.logo-icon{width:40px;height:40px;background:linear-gradient(135deg,var(--gold),var(--neon));border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px}
.tesla-mode .logo-icon{background:linear-gradient(135deg,var(--tesla-red),#C0C0C0);box-shadow:var(--cyber-glow)}
.logo-text{font-size:18px;font-weight:900;background:linear-gradient(135deg,var(--gold),var(--neon));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.theme-toggle{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);width:40px;height:40px;border-radius:12px;color:#FFF;cursor:pointer}
.upstash-live{background:rgba(0,255,136,0.1);border:1px solid var(--neon);border-radius:12px;padding:8px;text-align:center;font-size:10px;color:var(--neon);margin:70px 16px 8px}
.upstash-live.off{background:rgba(255,0,0,0.1);border-color:red;color:red}
.content{margin-top:110px;padding-bottom:80px}
.stories-bar{display:flex;gap:12px;padding:16px;overflow-x:auto;border-bottom:1px solid rgba(255,255,255,0.05)}
.story-ring{width:68px;height:68px;border-radius:50%;padding:3px;background:linear-gradient(45deg,var(--gold),var(--neon),var(--tesla-red))}
.story-avatar{width:100%;height:100%;border-radius:50%;background:#000;display:flex;align-items:center;justify-content:center;font-size:24px}
.story-add{background:rgba(255,255,255,0.1);cursor:pointer}
.trending-bar{background:rgba(227,25,55,0.1);border:1px solid var(--tesla-red);border-radius:16px;padding:12px;margin:16px;display:none}
.tesla-mode .trending-bar{display:block}
.post{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.05);border-radius:20px;margin:16px;overflow:hidden}
.tesla-mode .post{border:1px solid rgba(227,25,55,0.3);box-shadow:inset 0 0 20px rgba(227,25,55,0.1)}
.post-header{display:flex;align-items:center;gap:12px;padding:16px}
.post-avatar{width:44px;height:44px;border-radius:50%;background:linear-gradient(135deg,var(--gold),var(--neon));display:flex;align-items:center;justify-content:center;font-weight:700}
.post-user{flex:1}
.post-name{font-weight:700;font-size:14px}
.post-time{font-size:11px;color:rgba(255,255,255,0.5)}
.post-content{padding:0 16px 16px;font-size:14px;line-height:1.6}
.reaction-bar{display:flex;gap:16px;padding:12px 16px;border-top:1px solid rgba(255,255,255,0.05)}
.react-btn{background:none;border:none;color:rgba(255,255,255,0.6);font-size:20px;cursor:pointer;transition:all 0.3s}
.react-btn.liked{color:var(--tesla-red);transform:scale(1.2)}
.dm-fab{position:fixed;bottom:80px;left:16px;width:56px;height:56px;border-radius:50%;background:linear-gradient(135deg,var(--neon),var(--gold));border:none;color:#000;font-size:24px;cursor:pointer;box-shadow:0 8px 24px rgba(0,255,136,0.4);z-index:998}
.fab-menu{position:fixed;bottom:80px;right:16px;display:flex;flex-direction:column;gap:12px;z-index:998}
.fab-mini{width:48px;height:48px;border-radius:50%;background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);color:#FFF;font-size:20px;cursor:pointer;backdrop-filter:blur(10px)}
.music-player{position:fixed;bottom:0;left:0;right:0;background:rgba(10,10,10,0.95);backdrop-filter:blur(20px);border-top:1px solid var(--gold);padding:12px 16px;display:none;z-index:1001}
.music-player.active{display:flex;align-items:center;gap:12px}
.modal{position:fixed;inset:0;background:rgba(0,0,0,0.95);backdrop-filter:blur(20px);z-index:2000;display:none;align-items:center;justify-content:center}
.modal.active{display:flex}
.modal-content{background:rgba(20,20,20,0.95);border:1px solid rgba(255,215,0,0.3);border-radius:24px;padding:24px;width:90%;max-width:400px}
.modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
.modal-title{font-size:18px;font-weight:700}
.close-modal{background:none;border:none;color:#FFF;font-size:24px;cursor:pointer}
input{width:100%;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:12px;padding:14px;color:#FFF;margin-bottom:12px;font-family:Orbitron}
.btn-whatsapp{width:100%;background:linear-gradient(135deg,var(--gold),var(--neon));color:#000;border:none;padding:16px;border-radius:20px;font-size:15px;font-weight:700;font-family:Orbitron;cursor:pointer}
.tesla-badge{position:fixed;top:70px;right:16px;background:rgba(227,25,55,0.2);border:1px solid var(--tesla-red);padding:6px 12px;border-radius:12px;font-size:10px;font-family:Orbitron;color:var(--tesla-red);z-index:999;box-shadow:var(--cyber-glow);display:none}
.tesla-mode .tesla-badge{display:block}
</style>
</head>
<body>
<div class="header">
<div class="logo"><div class="logo-icon">⚜️</div><div class="logo-text">DOUNIUM 8D</div></div>
<div style="display:flex;gap:8px">
<button class="theme-toggle" onclick="openEmailModal()">👤</button>
<button class="theme-toggle" onclick="activateTesla()">⚡</button>
</div>

<div class="upstash-live off" id="upstash-badge">● MODE LOCAL</div>
<div class="tesla-badge">⚡ TESLA MODE ENGAGED</div>

<div class="content">
<div class="stories-bar" id="stories-bar">
<div class="story-ring" onclick="addStory()"><div class="story-avatar story-add">+</div></div>
<div class="story-ring"><div class="story-avatar">⚜️</div></div>
<div class="story-ring"><div class="story-avatar">🚀</div></div>
</div>
<div class="trending-bar">🔥 TRENDING: #Dounium8D #TeslaMode #SangRéel</div>
<div id="posts-container"></div>
</div>

<button class="dm-fab" onclick="openDM()">💬</button>
<div class="fab-menu">
<button class="fab-mini" onclick="toggleMusic()">🎵</button>
<button class="fab-mini" onclick="toggleReels()">📱</button>
<button class="fab-mini" onclick="openComposer()">✍️</button>
</div>

<div class="music-player" id="music-player">
<div style="flex:1">
<div style="font-size:12px;font-weight:700">DOUNIUM ANTHEM</div>
<div style="font-size:10px;color:rgba(255,255,255,0.6)">Shiva 847 · 8D</div>
</div>
<button onclick="playPause()" style="background:var(--gold);border:none;width:40px;height:40px;border-radius:50%;color:#000">▶</button>
</div>

<div class="modal" id="email-modal">
<div class="modal-content">
<div class="modal-header"><div class="modal-title">⚜️ CRÉER TON PROFIL</div><button class="close-modal" onclick="closeEmailModal()">×</button></div>
<input type="text" id="reg-name" placeholder="Nom / Pseudo">
<input type="email" id="reg-email" placeholder="Email">
<input type="password" id="reg-pass" placeholder="Mot de passe">
<button class="btn-whatsapp" onclick="registerEmail()">⚡ VALIDER PROFIL</button>
</div></div>

<div class="modal" id="verify-modal">
<div class="modal-content">
<div class="modal-title" style="margin-bottom:16px">📧 CODE EMAIL</div>
<input type="tel" id="email-code" placeholder="000000" maxlength="6" style="text-align:center;letter-spacing:8px;font-size:20px">
<button class="btn-whatsapp" onclick="verifyEmailCode()">✅ CONFIRMER</button>
</div></div>

<div class="modal" id="composer-modal">
<div class="modal-content">
<div class="modal-header"><div class="modal-title">✍️ NOUVEAU POST</div><button class="close-modal" onclick="closeComposer()">×</button></div>
<textarea id="post-content" placeholder="Exprime ton Sang Réel..." style="width:100%;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:12px;padding:14px;color:#FFF;min-height:100px;font-family:Orbitron"></textarea>
<button class="btn-whatsapp" onclick="submitPost()">🚀 POSTER 8D</button>
</div></div>

<script>
const UPSTASH_URL="";const UPSTASH_TOKEN=""; // METS TES CLÉS ICI
let currentUser=null;let reelsMode=false;let musicPlaying=false;

window.addEventListener("load",()=>{
let user=localStorage.getItem("dounium_user");
if(!user){
currentUser={name:"Visiteur",email:"",verified:false,bio:"Mode Libre · Crée ton profil"};
localStorage.setItem("dounium_user",JSON.stringify(currentUser));
}else{currentUser=JSON.parse(user)}
if(localStorage.getItem("dounium_tesla")==="true")document.body.classList.add("tesla-mode");
checkUpstash();setTimeout(loadCloudPosts,1000);
});

async function checkUpstash(){
if(!UPSTASH_URL)return;
try{
const res=await fetch(`${UPSTASH_URL}/ping`,{headers:{Authorization:`Bearer ${UPSTASH_TOKEN}`}});
const data=await res.json();
if(data.result==="PONG"){
document.getElementById("upstash-badge").textContent="● SANG RÉEL - CLOUD LIVE";
document.getElementById("upstash-badge").classList.remove("off");
}else throw "";
}catch(e){
document.getElementById("upstash-badge").textContent="● MODE LOCAL";
document.getElementById("upstash-badge").classList.add("off");
}}
setInterval(checkUpstash,10000);

async function saveToUpstash(key,data){
if(!UPSTASH_URL)return;
try{await fetch(`${UPSTASH_URL}/set/${key}`,{method:"POST",headers:{Authorization:`Bearer ${UPSTASH_TOKEN}`},body:JSON.stringify(data)})}catch(e){}
}
async function getFromUpstash(key){
if(!UPSTASH_URL)return null;
try{const res=await fetch(`${UPSTASH_URL}/get/${key}`,{headers:{Authorization:`Bearer ${UPSTASH_TOKEN}`}});const data=await res.json();return data.result?JSON.parse(data.result):null}catch(e){return null}
}

function openEmailModal(){document.getElementById("email-modal").classList.add("active")}
function closeEmailModal(){document.getElementById("email-modal").classList.remove("active")}
function registerEmail(){
const name=document.getElementById("reg-name").value;
const email=document.getElementById("reg-email").value;
const pass=document.getElementById("reg-pass").value;
if(!name||!email||!pass||!email.includes("@")){alert("Remplis tout");return}
const code=Math.floor(100000+Math.random()*900000).toString();
localStorage.setItem("dounium_email_code",code);
localStorage.setItem("dounium_temp_user",JSON.stringify({name,email}));
closeEmailModal();document.getElementById("verify-modal").classList.add("active");
alert("📧 Code: "+code);
}
function verifyEmailCode(){
if(document.getElementById("email-code").value===localStorage.getItem("dounium_email_code")){
const temp=JSON.parse(localStorage.getItem("dounium_temp_user"));
currentUser={name:temp.name,email:temp.email,verified:true,bio:"Créateur d'Univers · Vérifié ⚜️"};
localStorage.setItem("dounium_user",JSON.stringify(currentUser));
document.getElementById("verify-modal").classList.remove("active");
alert("⚜️ Profil Vérifié");
}else alert("Code incorrect");
}

function openComposer(){if(!currentUser.verified){openEmailModal();return}document.getElementById("composer-modal").classList.add("active")}
function closeComposer(){document.getElementById("composer-modal").classList.remove("active")}
async function submitPost(){
const content=document.getElementById("post-content").value;
if(!content)return;
const postId=Date.now();
const newPost={id:postId,user:currentUser.name,email:currentUser.email,content,org:"8D",time:Date.now(),likes:0,comments:[]};
renderPost(newPost);
let posts=await getFromUpstash("dounium_posts")||[];
posts.push(newPost);
await saveToUpstash("dounium_posts",posts);
closeComposer();document.getElementById("post-content").value="";
}
function renderPost(p){
const postHTML=`<div class="post" id="post-${p.id}">
<div class="post-header"><div class="post-avatar">${p.user[0]}</div>
<div class="post-user"><div class="post-name">${p.user}</div>
<div class="post-time">${new Date(p.time).toLocaleTimeString()} · ${p.org}</div></div></div>
<div class="post-content">${p.content}</div>
<div class="reaction-bar">
<button class="react-btn" onclick="toggleLike(${p.id},this)">❤️ <span>${p.likes}</span></button>
<button class="react-btn" onclick="addComment(${p.id})">💬 <span>${p.comments.length}</span></button>
<button class="react-btn" onclick="sharePost(${p.id})">🔗</button>
</div></div>`;
document.getElementById("posts-container").insertAdjacentHTML("afterbegin",postHTML);
}
async function loadCloudPosts(){
const posts=await getFromUpstash("dounium_posts");
if(posts&&posts.length){
document.getElementById("posts-container").innerHTML="";
posts.reverse().forEach(p=>renderPost(p));
}}
async function toggleLike(postId,btn){
if(!currentUser.verified){openEmailModal();return}
btn.classList.toggle("liked");
let posts=await getFromUpstash("dounium_posts")||[];
let post=posts.find(p=>p.id==postId);
if(post){post.likes=btn.classList.contains("liked")?post.likes+1:post.likes-1;
btn.querySelector("span").textContent=post.likes;
await saveToUpstash("dounium_posts",posts);}
}
function addComment(id){if(!currentUser.verified){openEmailModal();return}alert("💬 Comments 8D bientôt")}
function sharePost(id){navigator.clipboard.writeText(location.href);alert("🔗 Lien copié")}
function addStory(){if(!currentUser.verified){openEmailModal();return}alert("📸 Story 24h ajoutée")}
function openDM(){if(!currentUser.verified){openEmailModal();return}alert("💬 DM 8D bientôt")}
function toggleReels(){reelsMode=!reelsMode;alert(reelsMode?"📱 REELS ON":"📱 Feed Normal")}
function toggleMusic(){document.getElementById("music-player").classList.toggle("active")}
function playPause(){musicPlaying=!musicPlaying;event.target.textContent=musicPlaying?"⏸":"▶"}
function activateTesla(){document.body.classList.toggle("tesla-mode");localStorage.setItem("dounium_tesla",document.body.classList.contains("tesla-mode"))}
function showToast(msg){console.log(msg)}
</script>
</body>
</html>
