<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>DOUNIUM HALL QUANTIQUE</title>
</head>
<body style="background:#000;color:#0f0;font-family:monospace;padding:20px">
  <h2>DOUNIUM HALL QUANTIQUE ⚜️🦅</h2>
  <button onclick="invoque()" style="background:#0f0;color:#000;padding:10px 20px;border:none;font-weight:bold;cursor:pointer">INVOQUE</button>
  <input id="domain" value="google.com" style="background:#111;color:#0f0;border:1px solid #0f0;padding:10px;margin-left:10px">
  <pre id="agora" style="background:#111;color:#0f0;padding:15px;margin-top:15px;height:400px;overflow:auto;border:1px solid #0f0;white-space:pre-wrap">AGORA VIDE - CLIQUE INVOQUE</pre>

<script>
async function invoque(){
  const agora = document.getElementById('agora');
  const domain = document.getElementById('domain').value || 'google.com';
  agora.innerText = '[...] SCAN NEXUS + JUGE SUR ' + domain + '\n[...] HALL TERMUX ACTIF...';
  
  try {
    const res = await fetch(`https://7f32d7289fed0f.lhr.life/invoque?domain=${domain}`);
    const data = await res.json();
    
    if(!data.agora || data.agora.length === 0) {
      agora.innerText = '[ERREUR] Hall vide. Vérifie Termux + tunnel actif.';
      return;
    }
    
    agora.innerText = `AGORA ${domain.toUpperCase()} - ${data.agora.length} CIBLES:\n\n` + 
      data.agora.map(x => `[${x.status_code}] ${x.url} - ${x.title || 'No Title'}`).join('\n');
      
  } catch(e) {
    agora.innerText = `[ERREUR] ${e.message}\n1. Termux: node server.js actif?\n2. Tunnel: ssh -R actif?`;
  }
}
</script>
</body>
</html>
