async function init(){
updateTime();
setInterval(updateTime,1000);
await detectCountry();
await initAudio();
setInterval(syncHall,1000);
setInterval(cleanupOld,5000);
startChat();
}

async function detectCountry(){
try{
const r = await fetch('https://ipapi.co/json/');
const d = await r.json();
userCountry = d.country_code? String.fromCodePoint(...d.country_code.toUpperCase().split('').map(c=>127397+c.charCodeAt())) : '🌍';
}catch(e){}
}

function updateTime(){
document.getElementById('time').textContent=new Date().toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'});
}

async function initAudio(){
try{
micStream = await navigator.mediaDevices.getUserMedia({audio:{echoCancellation:true,noiseSuppression:true,autoGainControl:true}});
audioCtx = new AudioContext();
analyser = audioCtx.createAnalyser();
analyser.fftSize = 256;
audioCtx.createMediaStreamSource(micStream).connect(analyser);
document.getElementById('hallStatus').textContent='Connecté au Hall Mondial';
detectSpeaking();
initWebRTC();
}catch(e){
document.getElementById('hallStatus').textContent='Micro refusé - Mode spectateur';
sendHeartbeat(false);
}
}

function detectSpeaking(){
if(!analyser) return;
const data = new Uint8Array(analyser.frequencyBinCount);
requestAnimationFrame(function loop(){
analyser.getByteFrequencyData(data);
const vol = data.reduce((a,b)=>a+b)/data.length;
const speaking = vol > 12;
if(speaking!== mySpeaking || Date.now()-lastSync>2000){
mySpeaking = speaking;
lastSync = Date.now();
sendHeartbeat(speaking);
}
requestAnimationFrame(loop);
});
}

async function sendHeartbeat(speaking){
const userData = JSON.stringify({name:USERNAME,speaking,ts:Date.now(),uid:UID,country:userCountry});
await fetch(`${UPSTASH_URL}/hset/room:${ROOM}/${UID}`,{
method:'POST',
headers:{Authorization:`Bearer ${UPSTASH_TOKEN}`},
body:userData
});
await fetch(`${UPSTASH_URL}/expire/room:${ROOM}/60`,{
headers:{Authorization:`Bearer ${UPSTASH_TOKEN}`}
});
}

async function syncHall(){
const r = await fetch(`${UPSTASH_URL}/hgetall/room:${ROOM}`,{
headers:{Authorization:`Bearer ${UPSTASH_TOKEN}`}
});
const data = await r.json();
const raw = data.result || [];
hallUsers = [];
for(let i=0;i<raw.length;i+=2){
const id=raw[i];
try{
const user=JSON.parse(raw[i+1]);
if(Date.now()-user.ts<15000) hallUsers.push({id,...user});
}catch(e){}
}
hallUsers.sort((a,b)=>b.speaking-a.speaking || b.ts-a.ts);
renderCircles();
document.getElementById('hallCount').textContent = `${hallUsers.length} frère${hallUsers.length>1?'s':''} connecté${hallUsers.length>1?'s':''}`;
}

async function cleanupOld(){
await fetch(`${UPSTASH_URL}/eval`,{
method:'POST',
headers:{Authorization:`Bearer ${UPSTASH_TOKEN}`,'Content-Type':'application/json'},
body:JSON.stringify({
script:"for i,v in ipairs(redis.call('HKEYS',KEYS[1])) do local u=cjson.decode(redis.call('HGET',KEYS[1],v)) if u.ts<ARGV[1] then redis.call('HDEL',KEYS[1],v) end end",
keys:[`room:${ROOM}`],
args:[Date.now()-15000]
})
});
}

function renderCircles(){
const c=document.getElementById('circles');
if(!hallUsers.length){
c.innerHTML=`<div class="circle-wrap"><div class="circle">🌑</div><div class="circle-name">Hall vide</div><div class="circle-status">Sois le premier</div></div>`;
return;
}
c.innerHTML=hallUsers.map(u=>`
<div class="circle-wrap">
<div class="circle ${u.speaking?'pulse':''} ${u.uid===UID?'you':''}">${u.name[0]||'?'}</div>
<div class="circle-name">● ${u.uid===UID?'Toi':u.name}</div>
<div class="circle-status">${u.speaking?'Live':'Idle'}</div>
<div class="circle-flag">${u.country||'🌍'}</div>
</div>
`).join('');
}

function startChat(){
const msgs = [
'🌍 Hall Mondial actif','🫁 Respire avec tes frères','🎵 Radio Dounium live','📚 Apprends avec le Hall',
'❤️ Santé = richesse','🎨 Art = âme du monde','📰 News vraies du terrain','🌳 Nature guérit',
'💕 Amour connecte','🕊️ Spirit élève','💼 Work ensemble','🌙 Rêve grand','🤲 Donner = recevoir','🔥 Sang réel'
];
let i=0;
setInterval(()=>{
document.getElementById('chat').innerHTML=`<div class="chat-msg">${msgs[i%msgs.length]}</div>`;
i++;
},4000);
}

function openModule(type){
const o=document.getElementById('overlay');
const t=document.getElementById('overlayTitle');
const c=document.getElementById('overlayContent');
const b=document.getElementById('breathCircle');
const app = APPS[type];
o.classList.add('active');
t.textContent = app.title;

b.style.display = app.breath? 'block' : 'none';
if(app.breath) navigator.vibrate&&navigator.vibrate([200,100,200]);

}

</script>

<script>
// WEBRTC P2P + MUSIC + SOCIAL 8S
const peers = {}, peerConns = {}, peerAudios = {};
let spatialAudioCtx, radioAudio, radioAnalyser, mediaRecorder, audioChunks=[];

async function initWebRTC(){
  spatialAudioCtx = new AudioContext();
  await spatialAudioCtx.resume();
  setInterval(signalPoll,2000);
  setInterval(announceSelf,3000);
}

async function announceSelf(){
  const offer = {type:'announce',uid:UID,name:USERNAME,ts:Date.now()};
  await fetch(`${UPSTASH_URL}/lpush/signal:${ROOM}`,{method:'POST',headers:{Authorization:`Bearer ${UPSTASH_TOKEN}`},body:JSON.stringify(offer)});
  await fetch(`${UPSTASH_URL}/ltrim/signal:${ROOM}/0/99`,{headers:{Authorization:`Bearer ${UPSTASH_TOKEN}`}});
}

async function signalPoll(){
  const r = await fetch(`${UPSTASH_URL}/lrange/signal:${ROOM}/0/20`,{headers:{Authorization:`Bearer ${UPSTASH_TOKEN}`}});
  const data = await r.json();
  const signals = data.result||[];
  for(const s of signals){
    try{
      const sig = JSON.parse(s);
      if(sig.uid===UID || Date.now()-sig.ts>10000) continue;
      if(sig.type==='announce' &&!peerConns[sig.uid]) connectToPeer(sig.uid,sig.name);
      if(sig.type==='offer' && sig.to===UID) handleOffer(sig);
      if(sig.type==='answer' && sig.to===UID) handleAnswer(sig);
      if(sig.type==='ice' && sig.to===UID) handleIce(sig);
    }catch(e){}
  }
}

async function connectToPeer(peerId,peerName){
  if(peerConns[peerId]) return;
  const pc = new RTCPeerConnection({iceServers:[{urls:'stun:stun.l.google.com:19302'}]});
  peerConns[peerId] = pc;
  peers[peerId] = {name:peerName};
  if(micStream) micStream.getTracks().forEach(t=>pc.addTrack(t,micStream));
  pc.ontrack = e=>{
    const audio = new Audio(); audio.srcObject = e.streams[0]; audio.autoplay = true;
    const idx = hallUsers.findIndex(u=>u.uid===peerId);
    const pan = idx>=0? (idx/hallUsers.length*2-1)*0.8 : 0;
    const panner = spatialAudioCtx.createStereoPanner(); panner.pan.value = pan;
    const src = spatialAudioCtx.createMediaStreamSource(e.streams[0]);
    src.connect(panner).connect(spatialAudioCtx.destination);
    peerAudios[peerId] = audio;
  };
  pc.onicecandidate = e=>{if(e.candidate){fetch(`${UPSTASH_URL}/lpush/signal:${ROOM}`,{method:'POST',headers:{Authorization:`Bearer ${UPSTASH_TOKEN}`},body:JSON.stringify({type:'ice',from:UID,to:peerId,candidate:e.candidate})})}};
  const offer = await pc.createOffer(); await pc.setLocalDescription(offer);
  await fetch(`${UPSTASH_URL}/lpush/signal:${ROOM}`,{method:'POST',headers:{Authorization:`Bearer ${UPSTASH_TOKEN}`},body:JSON.stringify({type:'offer',from:UID,to:peerId,sdp:offer})});
}

async function handleOffer(sig){
  const pc = new RTCPeerConnection({iceServers:[{urls:'stun:stun.l.google.com:19302'}]});
  peerConns[sig.from] = pc; peers[sig.from] = {name:'Frère'};
  if(micStream) micStream.getTracks().forEach(t=>pc.addTrack(t,micStream));
  pc.ontrack = e=>{
    const audio = new Audio(); audio.srcObject = e.streams[0]; audio.autoplay = true;
    const idx = hallUsers.findIndex(u=>u.uid===sig.from);
    const pan = idx>=0? (idx/hallUsers.length*2-1)*0.8 : 0;
    const panner = spatialAudioCtx.createStereoPanner(); panner.pan.value = pan;
    const src = spatialAudioCtx.createMediaStreamSource(e.streams[0]);
    src.connect(panner).connect(spatialAudioCtx.destination);
    peerAudios[sig.from] = audio;
  };
  pc.onicecandidate = e=>{if(e.candidate){fetch(`${UPSTASH_URL}/lpush/signal:${ROOM}`,{method:'POST',headers:{Authorization:`Bearer ${UPSTASH_TOKEN}`},body:JSON.stringify({type:'ice',from:UID,to:sig.from,candidate:e.candidate})})}};
  await pc.setRemoteDescription(new RTCSessionDescription(sig.sdp));
  const answer = await pc.createAnswer(); await pc.setLocalDescription(answer);
  await fetch(`${UPSTASH_URL}/lpush/signal:${ROOM}`,{method:'POST',headers:{Authorization:`Bearer ${UPSTASH_TOKEN}`},body:JSON.stringify({type:'answer',from:UID,to:sig.from,sdp:answer})});
}

async function handleAnswer(sig){const pc=peerConns[sig.from];if(pc)await pc.setRemoteDescription(new RTCSessionDescription(sig.sdp))}
async function handleIce(sig){const pc=peerConns[sig.from];if(pc)await pc.addIceCandidate(new RTCIceCandidate(sig.candidate))}

setInterval(()=>{
  const count = Object.keys(peerConns).length;
  if(count>0) document.getElementById('hallStatus').textContent = `🔊 ${count} frère${count>1?'s':''} P2P connecté${count>1?'s':''}`;
},2000);

APPS.MUSIC.live = async function(){
  const c = document.getElementById('overlayContent');
  c.innerHTML = `<div style="margin:20px 0"><div style="font-size:12px;margin-bottom:8px">🎵 DOUNIUM RADIO LIVE</div><div id="nowPlaying" style="font-size:14px;color:#FFD700">Afrobeat Sénégal • Live</div><canvas id="visualizer" width="280" height="80" style="margin:12px 0;border:1px solid rgba(255,215,0,0.2)"></canvas><div style="display:flex;gap:8px;justify-content:center"><button onclick="playRadio()" style="background:#00FF88;color:#000;border:none;padding:8px 16px;border-radius:8px;font-family:Orbitron;font-weight:700">▶️ PLAY</button><button onclick="stopRadio()" style="background:rgba(255,255,255,0.1);color:#FFF;border:1px solid #FFF;padding:8px 16px;border-radius:8px;font-family:Orbitron">⏹️ STOP</button></div></div>`;
};

window.playRadio = function(){
  if(radioAudio) return;
  radioAudio = new Audio('https://icecast.radiofrance.fr/fip-midfi.mp3'); radioAudio.crossOrigin='anonymous';
  radioCtx = new AudioContext(); radioAnalyser = radioCtx.createAnalyser();
  const src = radioCtx.createMediaElementSource(radioAudio);
  src.connect(radioAnalyser); radioAnalyser.connect(radioCtx.destination); radioAudio.play(); drawVisualizer();

  const available = hallUsers.filter(u=>u.uid!==UID);
  if(!available.length){roster.innerHTML='<div style="color:rgba(255,255,255,0.5)">Aucun frère dispo</div>';return;}
  roster.innerHTML = available.map(u=>`<button onclick="challengeBrother('${u.uid}','${u.name}')" style="background:rgba(255,215,0,0.1);border:1px solid #FFD700;color:#FFF;padding:8px;margin:4px;border-radius:8px;font-family:Orbitron;font-size:11px;width:100%">${u.country||'🌍'} ${u.name}</button>`).join('');
}

window.challengeBrother = async function(uid,name){
  battleOpponent={uid,name};
  document.getElementById('battleStatus').textContent=`VS ${name}`;
  document.getElementById('battleBtn').style.display='block';
  await fetch(`${UPSTASH_URL}/lpush/battle:${ROOM}`,{method:'POST',headers:{Authorization:`Bearer ${UPSTASH_TOKEN}`},body:JSON.stringify({type:'challenge',from:UID,fromName:USERNAME,to:uid,ts:Date.now()})});
};

window.startBattle = async function(){
  if(!battleOpponent) return;
  battleActive=true; battleTimer=30;
  document.getElementById('battleTimer').style.display='block';
  document.getElementById('battleScore').style.display='block';
  document.getElementById('battleBtn').style.display='none';
  document.getElementById('battleStatus').textContent='🎤 RAP 30s!';
  
  await fetch(`${UPSTASH_URL}/lpush/battle:${ROOM}`,{method:'POST',headers:{Authorization:`Bearer ${UPSTASH_TOKEN}`},body:JSON.stringify({type:'start',player1:UID,player2:battleOpponent.uid,ts:Date.now()})});
  
  battleInterval = setInterval(()=>{
    battleTimer--;
    document.getElementById('battleTimer').textContent=battleTimer+'s';
    if(battleTimer<=0){
      clearInterval(battleInterval);
      endBattle();
    }
  },1000);
};

async function endBattle(){
  battleActive=false;
  const myScore = Math.floor(Math.random()*50)+50;
  const oppScore = Math.floor(Math.random()*50)+50;
  document.getElementById('battleScore').innerHTML=`Toi: ${myScore} 🔥 • ${battleOpponent.name}: ${oppScore} 🔥`;
  document.getElementById('battleStatus').textContent = myScore>oppScore?'🏆 VICTOIRE!':myScore<oppScore?'💀 DÉFAITE':'🤝 ÉGALITÉ';
  document.getElementById('battleTimer').style.display='none';
  
  await fetch(`${UPSTASH_URL}/lpush/battle:${ROOM}`,{method:'POST',headers:{Authorization:`Bearer ${UPSTASH_TOKEN}`},body:JSON.stringify({type:'end',winner:myScore>oppScore?UID:battleOpponent.uid,score1:myScore,score2:oppScore,ts:Date.now()})});
  
  setTimeout(()=>{APPS.GAME.live();},3000);
}
</script>

async function loadNFTs(){
  const r = await fetch(`${UPSTASH_URL}/hgetall/nftshop:${ROOM}`,{headers:{Authorization:`Bearer ${UPSTASH_TOKEN}`}});
  const data = await r.json();
  const raw = data.result||[];
  nftList = [];
  for(let i=0;i<raw.length;i+=2){
    try{nftList.push(JSON.parse(raw[i+1]));}catch(e){}
  }
  // NFT par défaut si vide
  if(!nftList.length){
    nftList = [
      {id:'nft1',emoji:'🎨',name:'Soleil Dakar',artist:'Amadou',flag:'🇸🇳',desc:'Acrylique sur toile',price:50},
      {id:'nft2',emoji:'📜',name:'Poème Hall',artist:'Fatou',flag:'🇲🇱',desc:'Vers libres 6D',price:30},
      {id:'nft3',emoji:'🎵',name:'Beat Bamako',artist:'Ibra',flag:'🇲🇱',desc:'Trap 128bpm',price:40}
    ];
  }
}

window.buyNFT = async function(nftId){
  const nft = nftList.find(n=>n.id===nftId);
  if(!nft || myBalance<nft.price) return alert('Balance insuffisante');
  myBalance -= nft.price;
  await fetch(`${UPSTASH_URL}/hset/wallet:${ROOM}/${UID}`,{method:'POST',headers:{Authorization:`Bearer ${UPSTASH_TOKEN}`},body:String(myBalance)});
  await fetch(`${UPSTASH_URL}/hset/mynft:${ROOM}:${UID}/${nftId}`,{method:'POST',headers:{Authorization:`Bearer ${UPSTASH_TOKEN}`},body:JSON.stringify({...nft,bought:Date.now()})});
  localStorage.setItem('dounium_balance',myBalance);
  alert(`✅ NFT "${nft.name}" acheté!`);
  APPS.WALLET.live();
};

async function loadMyNFTs(){

}

  </div>`;
  renderLeaderboard();
  renderBattleRoster();

async function loadTournament(){
  const r = await fetch(`${UPSTASH_URL}/hget/tournament:${ROOM}/current`,{headers:{Authorization:`Bearer ${UPSTASH_TOKEN}`}});
  const data = await r.json();
  if(data.result){
    tournamentData = JSON.parse(data.result);
  } else {
    const endDate = new Date(); endDate.setDate(endDate.getDate()+7);
    tournamentData = {prize:1000,ends:endDate.toLocaleDateString('fr-FR'),players:{}};
    await fetch(`${UPSTASH_URL}/hset/tournament:${ROOM}/current`,{method:'POST',headers:{Authorization:`Bearer ${UPSTASH_TOKEN}`},body:JSON.stringify(tournamentData)});
  }
}

function renderLeaderboard(){
  const board = document.getElementById('leaderboard');
  const players = Object.entries(tournamentData.players||{}).sort((a,b)=>b[1].score-a[1].score).slice(0,10);
  if(!players.length){
    board.innerHTML = '<div style="color:rgba(255,255,255,0.5)">Sois le premier!</div>';
    return;
  }
  board.innerHTML = players.map((p,i)=>`
    <div style="background:rgba(255,215,0,${i===0?0.2:0.05});padding:6px;border-radius:6px;margin:4px 0">
      ${i+1}. ${p[1].name} • ${p[1].score} pts ${p[1].country||'🌍'}
    </div>`).join('');
}

window.joinTournament = async function(){
  if(!tournamentData.players) tournamentData.players={};
  if(tournamentData.players[UID]) return alert('Déjà inscrit');
  tournamentData.players[UID] = {name:USERNAME,score:0,country:userCountry};
  await fetch(`${UPSTASH_URL}/hset/tournament:${ROOM}/current`,{method:'POST',headers:{Authorization:`Bearer ${UPSTASH_TOKEN}`},body:JSON.stringify(tournamentData)});
  alert('✅ Inscrit au Tournoi!');
  APPS.GAME.live();
};

// Override battle end pour ajouter points tournoi
const _endBattle = window.endBattle;
window.endBattle = async function(){
  const myScore = Math.floor(Math.random()*50)+50;
  const oppScore = Math.floor(Math.random()*50)+50;
  document.getElementById('battleScore').innerHTML=`Toi: ${myScore} 🔥 • ${battleOpponent.name}: ${oppScore} 🔥`;
  document.getElementById('battleStatus').textContent = myScore>oppScore?'🏆 VICTOIRE!':myScore<oppScore?'💀 DÉFAITE':'🤝 ÉGALITÉ';
  document.getElementById('battleTimer').style.display='none';
  
  // Ajouter points tournoi
  if(tournamentData.players && tournamentData.players[UID]){
    tournamentData.players[UID].score += myScore;
    await fetch(`${UPSTASH_URL}/hset/tournament:${ROOM}/current`,{method:'POST',headers:{Authorization:`Bearer ${UPSTASH_TOKEN}`},body:JSON.stringify(tournamentData)});
  }
  
  await fetch(`${UPSTASH_URL}/lpush/battle:${ROOM}`,{method:'POST',headers:{Authorization:`Bearer ${UPSTASH_TOKEN}`},body:JSON.stringify({type:'end',winner:myScore>oppScore?UID:battleOpponent.uid,score1:myScore,score2:oppScore,ts:Date.now()})});
  setTimeout(()=>{APPS.GAME.live();},3000);
};
</script>

async function loadTournament(){
  const r = await fetch(`${UPSTASH_URL}/hget/tournament:${ROOM}/current`,{headers:{Authorization:`Bearer ${UPSTASH_TOKEN}`}});
  const data = await r.json();
  if(data.result){
    tournamentData = JSON.parse(data.result);
  } else {
    const endDate = new Date(); endDate.setDate(endDate.getDate()+7);
    tournamentData = {prize:1000,ends:endDate.toLocaleDateString('fr-FR'),players:{}};
    await fetch(`${UPSTASH_URL}/hset/tournament:${ROOM}/current`,{method:'POST',headers:{Authorization:`Bearer ${UPSTASH_TOKEN}`},body:JSON.stringify(tournamentData)});
  }
}

function renderLeaderboard(){
  const board = document.getElementById('leaderboard');
  const players = Object.entries(tournamentData.players||{}).sort((a,b)=>b[1].score-a[1].score).slice(0,10);
  if(!players.length){
    board.innerHTML = '<div style="color:rgba(255,255,255,0.5)">Sois le premier!</div>';
    return;
  }
  board.innerHTML = players.map((p,i)=>`
    <div style="background:rgba(255,215,0,${i===0?0.2:0.05});padding:6px;border-radius:6px;margin:4px 0">
      ${i+1}. ${p[1].name} • ${p[1].score} pts ${p[1].country||'🌍'}
    </div>`).join('');
}

window.joinTournament = async function(){
  if(!tournamentData.players) tournamentData.players={};
  if(tournamentData.players[UID]) return alert('Déjà inscrit');
  tournamentData.players[UID] = {name:USERNAME,score:0,country:userCountry};
  await fetch(`${UPSTASH_URL}/hset/tournament:${ROOM}/current`,{method:'POST',headers:{Authorization:`Bearer ${UPSTASH_TOKEN}`},body:JSON.stringify(tournamentData)});

};

const _endBattle = window.endBattle;
window.endBattle = async function(){
  const myScore = Math.floor(Math.random()*50)+50;
  const oppScore = Math.floor(Math.random()*50)+50;
  document.getElementById('battleScore').innerHTML=`Toi: ${myScore} 🔥 • ${battleOpponent.name}: ${oppScore} 🔥`;
  document.getElementById('battleStatus').textContent = myScore>oppScore?'🏆 VICTOIRE!':myScore<oppScore?'💀 DÉFAITE':'🤝 ÉGALITÉ';
  document.getElementById('battleTimer').style.display='none';
  
  // Ajouter points tournoi
  if(tournamentData.players && tournamentData.players[UID]){
    tournamentData.players[UID].score += myScore;
    await fetch(`${UPSTASH_URL}/hset/tournament:${ROOM}/current`,{method:'POST',headers:{Authorization:`Bearer ${UPSTASH_TOKEN}`},body:JSON.stringify(tournamentData)});
  }
  
  await fetch(`${UPSTASH_URL}/lpush/battle:${ROOM}`,{method:'POST',headers:{Authorization:`Bearer ${UPSTASH_TOKEN}`},body:JSON.stringify({type:'end',winner:myScore>oppScore?UID:battleOpponent.uid,score1:myScore,score2:oppScore,ts:Date.now()})});

};

let voiceNavActive = false;
let navTarget = null;

window.toggleGPS = function(){
  if(gpsInterval){
    clearInterval(gpsInterval);
    gpsInterval = null;
    document.getElementById('gpsBtn').textContent = '📍 GPS LIVE';
    document.getElementById('gpsBtn').style.background = 'rgba(0,255,136,0.2)';
    document.getElementById('etaBox').style.display = 'none';
    stopGPSTracking();
  } else {
    startGPSTracking();
    document.getElementById('gpsBtn').textContent = '⏹️ STOP GPS';
    document.getElementById('gpsBtn').style.background = 'rgba(255,0,0,0.2)';
    document.getElementById('gpsBtn').style.borderColor = '#FF0000';
    document.getElementById('gpsBtn').style.color = '#FF0000';
  }
};

function startGPSTracking(){
  if(!navigator.geolocation) return alert('GPS non supporté');
  gpsInterval = setInterval(()=>{
    navigator.geolocation.getCurrentPosition(async pos=>{
      myLocation = {lat:pos.coords.latitude,lon:pos.coords.longitude,uid:UID,ts:Date.now(),speed:pos.coords.speed||0,heading:pos.coords.heading};
      await fetch(`${UPSTASH_URL}/hset/gps:${ROOM}/${UID}`,{
        method:'POST',headers:{Authorization:`Bearer ${UPSTASH_TOKEN}`},body:JSON.stringify(myLocation)
      });
      await fetch(`${UPSTASH_URL}/expire/gps:${ROOM}/120`,{headers:{Authorization:`Bearer ${UPSTASH_TOKEN}`}});
      updateETAToBrothers();
      if(voiceNavActive && navTarget) updateVoiceNav();
    });
  },3000);
}

async function updateETAToBrothers(){
  if(!myLocation) return;
  const r = await fetch(`${UPSTASH_URL}/hgetall/gps:${ROOM}`,{headers:{Authorization:`Bearer ${UPSTASH_TOKEN}`}});
  const data = await r.json();
  const raw = data.result||[];
  const brothers = [];
  for(let i=0;i<raw.length;i+=2){
    try{
      const bro = JSON.parse(raw[i+1]);
      if(bro.uid!==UID && Date.now()-bro.ts<60000) brothers.push(bro);
    }catch(e){}
  }
  if(!brothers.length) return;
  const etas = brothers.map(bro=>{
    const dist = haversine(myLocation.lat,myLocation.lon,bro.lat,bro.lon);
    const brother = hallUsers.find(u=>u.uid===bro.uid);
    const bearing = calculateBearing(myLocation.lat,myLocation.lon,bro.lat,bro.lon);
    return {name:brother?.name||'Frère',dist:dist.toFixed(1),country:brother?.country||'🌍',bearing,uid:bro.uid};
  }).sort((a,b)=>a.dist-b.dist).slice(0,3);
  
  document.getElementById('etaBox').style.display = 'block';
  document.getElementById('etaBox').innerHTML = `<div style="font-size:9px;color:#00FF88;margin-bottom:4px">📍 FRÈRES PROCHES</div>${etas.map(e=>`
    <div style="display:flex;justify-content:space-between;align-items:center;margin:3px 0">
      <span>${e.name} ${e.country} • ${e.dist}km</span>
      <button onclick="startVoiceNav('${e.uid}','${e.name}')" style="background:#00FF88;color:#000;border:none;padding:2px 6px;border-radius:4px;font-size:8px">GUIDER</button>
    </div>`).join('')}`;
}

window.startVoiceNav = function(uid,name){
  navTarget = {uid,name};
  voiceNavActive = true;
  alert(`🎤 Navigation vocale activée vers ${name}`);
  speakDirection('Navigation démarrée vers '+name);
};

function updateVoiceNav(){
  const target = hallUsers.find(u=>u.uid===navTarget.uid);
  if(!target) return;
  const r = fetch(`${UPSTASH_URL}/hget/gps:${ROOM}/${navTarget.uid}`,{headers:{Authorization:`Bearer ${UPSTASH_TOKEN}`}})
   .then(r=>r.json()).then(data=>{
      if(!data.result) return;
      const bro = JSON.parse(data.result);
      const dist = haversine(myLocation.lat,myLocation.lon,bro.lat,bro.lon);
      const bearing = calculateBearing(myLocation.lat,myLocation.lon,bro.lat,bro.lon);
      const direction = getDirectionText(bearing);
      if(dist<0.05){
        speakDirection('Tu es arrivé frère');
        voiceNavActive=false;
      } else if(Math.random()<0.3){ // 30% chance pour pas spam
        speakDirection(`${navTarget.name} à ${Math.round(dist*1000)} mètres. ${direction}`);
      }
    });
}

function calculateBearing(lat1,lon1,lat2,lon2){
  const dLon = (lon2-lon1)*Math.PI/180;
  const y = Math.sin(dLon)*Math.cos(lat2*Math.PI/180);
  const x = Math.cos(lat1*Math.PI/180)*Math.sin(lat2*Math.PI/180)-Math.sin(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.cos(dLon);
  return (Math.atan2(y,x)*180/Math.PI+360)%360;
}

function getDirectionText(bearing){
  if(bearing<45||bearing>315) return 'devant toi';
  if(bearing<135) return 'à ta droite';
  if(bearing<225) return 'derrière toi';
  return 'à ta gauche';
}

function speakDirection(text){
  if('speechSynthesis' in window){
    const msg = new SpeechSynthesisUtterance(text);
    msg.lang='fr-FR';msg.rate=1.1;
    speechSynthesis.speak(msg);
  }
}

function initOrientation(){
  if(window.DeviceOrientationEvent){
    window.addEventListener('deviceorientation',(e)=>{
      deviceOrientation.alpha = e.alpha||0;
      deviceOrientation.beta = e.beta||0;
      deviceOrientation.gamma = e.gamma||0;
    });
  }
}

async function renderAROverlay(){
  if(!arStream) return;
  const canvas = document.getElementById('arCanvas');
  const ctx = canvas.getContext('2d');
  const r = await fetch(`${UPSTASH_URL}/hgetall/gps:${ROOM}`,{headers:{Authorization:`Bearer ${UPSTASH_TOKEN}`}});
  const data = await r.json();
  const raw = data.result||[];
  const brothers = [];
  for(let i=0;i<raw.length;i+=2){
    try{
      const bro = JSON.parse(raw[i+1]);
      if(bro.uid!==UID && Date.now()-bro.ts<60000 && myLocation) {
        const dist = haversine(myLocation.lat,myLocation.lon,bro.lat,bro.lon);
        const bearing = calculateBearing(myLocation.lat,myLocation.lon,bro.lat,bro.lon);
        const brother = hallUsers.find(u=>u.uid===bro.uid);
        brothers.push({name:brother?.name||'Frère',dist,bearing,country:brother?.country||'🌍'});
      }
    }catch(e){}
  }
  
  function drawAR(){
    if(!arStream) return;
    ctx.clearRect(0,0,300,300);
    ctx.font='12px Orbitron';
    ctx.fillStyle='#FF00FF';
    ctx.strokeStyle='#000';
    ctx.lineWidth=3;
    
    brothers.forEach(bro=>{
      const angleDiff = (bro.bearing - deviceOrientation.alpha + 360) % 360;
      if(angleDiff<45||angleDiff>315){ // Dans le champ de vision
        const x = 150 + Math.sin((angleDiff-360)*Math.PI/180)*100;
        const y = 150;
        const text = `${bro.name} ${bro.country} ↑ ${bro.dist.toFixed(1)}km`;
        ctx.strokeText(text,x,y);
        ctx.fillText(text,x,y);
        
        // Flèche 3D
        ctx.beginPath();
        ctx.moveTo(x,y-20);
        ctx.lineTo(x-10,y-5);
        ctx.lineTo(x+10,y-5);
        ctx.closePath();
        ctx.fillStyle='#FFD700';
        ctx.fill();
      }
    });
    requestAnimationFrame(drawAR);
  }
  drawAR();
}

async function initVRMuseum(session){
  const canvas = document.createElement('canvas');
  document.body.appendChild(canvas);
  const gl = canvas.getContext('webgl',{xrCompatible:true});
  const scene = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(70,window.innerWidth/window.innerHeight,0.1,1000);
  const renderer = new THREE.WebGLRenderer({canvas,context:gl});
  renderer.xr.enabled = true;
  renderer.xr.setSession(session);
  
  // Musée VR
  const light = new THREE.PointLight(0xFFD700,1,100);
  light.position.set(0,3,0);
  scene.add(light);
  scene.add(new THREE.AmbientLight(0x404040));
  
  const floor = new THREE.Mesh(new THREE.PlaneGeometry(20,20),new THREE.MeshPhongMaterial({color:0x0A0A0A}));
  floor.rotation.x = -Math.PI/2;
  scene.add(floor);
  
  const myNfts = await getMyNFTsList();
  myNfts.forEach((nft,i)=>{
    const wall = new THREE.Mesh(new THREE.BoxGeometry(0.1,3,3),new THREE.MeshPhongMaterial({color:0x1A1A1A}));
    wall.position.set(Math.cos(i*Math.PI/2)*5,1.5,Math.sin(i*Math.PI/2)*5);
    wall.lookAt(0,1.5,0);
    scene.add(wall);
    
    const canvas2 = document.createElement('canvas');
    canvas2.width=512;canvas2.height=512;
    const ctx = canvas2.getContext('2d');
    ctx.fillStyle='#000';ctx.fillRect(0,0,512,512);
    ctx.font='200px Arial';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(nft.emoji,256,256);
    const tex = new THREE.CanvasTexture(canvas2);
    const art = new THREE.Mesh(new THREE.PlaneGeometry(2,2),new THREE.MeshBasicMaterial({map:tex}));
    art.position.copy(wall.position);
    art.position.y=1.5;
    art.lookAt(0,1.5,0);
    art.translateZ(0.06);
    scene.add(art);
  });
  
  renderer.setAnimationLoop(()=>{
    renderer.render(scene,camera);
  });
}

      }
    }
  }

function startFilmingAngle(hostUid){
  navigator.mediaDevices.getUserMedia({video:true,audio:true}).then(stream=>{
    const recorder = new MediaRecorder(stream);
    const chunks = [];
    recorder.ondataavailable = e=>chunks.push(e.data);
    recorder.onstop = async ()=>{
      const blob = new Blob(chunks,{type:'video/webm'});
      const b64 = await blobToBase64(blob);
      await fetch(`${UPSTASH_URL}/lpush/finale:${ROOM}:angles`,{method:'POST',headers:{Authorization:`Bearer ${UPSTASH_TOKEN}`},body:JSON.stringify({uid:UID,b64,ts:Date.now()})});
      stream.getTracks().forEach(t=>t.stop());
    };
    recorder.start();
    setTimeout(()=>recorder.stop(),30000); // 30s
  });
}

function blobToBase64(blob){
  return new Promise(r=>{const reader=new FileReader();reader.onloadend=()=>r(reader.result);reader.readAsDataURL(blob);});
}

    window.addEventListener('deviceorientation',(e)=>{
      deviceOrientation.alpha = e.alpha||0;
      deviceOrientation.beta = e.beta||0;
      deviceOrientation.gamma = e.gamma||0;
    });

async function renderAROverlay(){
  if(!arStream) return;
  const canvas = document.getElementById('arCanvas');
  const ctx = canvas.getContext('2d');
  const r = await fetch(`${UPSTASH_URL}/hgetall/gps:${ROOM}`,{headers:{Authorization:`Bearer ${UPSTASH_TOKEN}`}});
  const data = await r.json();
  const raw = data.result||[];
  const brothers = [];
  for(let i=0;i<raw.length;i+=2){
    try{
      const bro = JSON.parse(raw[i+1]);
      if(bro.uid!==UID && Date.now()-bro.ts<60000 && myLocation) {
        const dist = haversine(myLocation.lat,myLocation.lon,bro.lat,bro.lon);
        const bearing = calculateBearing(myLocation.lat,myLocation.lon,bro.lat,bro.lon);
        const brother = hallUsers.find(u=>u.uid===bro.uid);
        brothers.push({name:brother?.name||'Frère',dist,bearing,country:brother?.country||'🌍'});
      }
    }catch(e){}
  }
  
  function drawAR(){
    if(!arStream) return;
    ctx.clearRect(0,0,300,300);
    ctx.font='12px Orbitron';
    ctx.fillStyle='#FF00FF';
    ctx.strokeStyle='#000';
    ctx.lineWidth=3;
    
    brothers.forEach(bro=>{
      const angleDiff = (bro.bearing - deviceOrientation.alpha + 360) % 360;
      if(angleDiff<45||angleDiff>315){ // Dans le champ de vision
        const x = 150 + Math.sin((angleDiff-360)*Math.PI/180)*100;
        const y = 150;
        const text = `${bro.name} ${bro.country} ↑ ${bro.dist.toFixed(1)}km`;
        ctx.strokeText(text,x,y);
        ctx.fillText(text,x,y);
        
        // Flèche 3D
        ctx.beginPath();
        ctx.moveTo(x,y-20);
        ctx.lineTo(x-10,y-5);
        ctx.lineTo(x+10,y-5);
        ctx.closePath();
        ctx.fillStyle='#FFD700';
        ctx.fill();
      }
    });
    requestAnimationFrame(drawAR);
  }
  drawAR();
}

async function initVRMuseum(session){
  const canvas = document.createElement('canvas');
  document.body.appendChild(canvas);
  const gl = canvas.getContext('webgl',{xrCompatible:true});
  const scene = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(70,window.innerWidth/window.innerHeight,0.1,1000);
  const renderer = new THREE.WebGLRenderer({canvas,context:gl});
  renderer.xr.enabled = true;
  renderer.xr.setSession(session);
  
  // Musée VR
  const light = new THREE.PointLight(0xFFD700,1,100);
  light.position.set(0,3,0);
  scene.add(light);
  scene.add(new THREE.AmbientLight(0x404040));
  
  const floor = new THREE.Mesh(new THREE.PlaneGeometry(20,20),new THREE.MeshPhongMaterial({color:0x0A0A0A}));
  floor.rotation.x = -Math.PI/2;
  scene.add(floor);
  
  const myNfts = await getMyNFTsList();
  myNfts.forEach((nft,i)=>{
    const wall = new THREE.Mesh(new THREE.BoxGeometry(0.1,3,3),new THREE.MeshPhongMaterial({color:0x1A1A1A}));
    wall.position.set(Math.cos(i*Math.PI/2)*5,1.5,Math.sin(i*Math.PI/2)*5);
    wall.lookAt(0,1.5,0);
    scene.add(wall);
    
    const canvas2 = document.createElement('canvas');
    canvas2.width=512;canvas2.height=512;
    const ctx = canvas2.getContext('2d');
    ctx.fillStyle='#000';ctx.fillRect(0,0,512,512);
    ctx.font='200px Arial';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(nft.emoji,256,256);
    const tex = new THREE.CanvasTexture(canvas2);
    const art = new THREE.Mesh(new THREE.PlaneGeometry(2,2),new THREE.MeshBasicMaterial({map:tex}));
    art.position.copy(wall.position);
    art.position.y=1.5;
    art.lookAt(0,1.5,0);
    art.translateZ(0.06);
    scene.add(art);
  });
  
  renderer.setAnimationLoop(()=>{
    renderer.render(scene,camera);
  });
}

function startFilmingAngle(hostUid){
  navigator.mediaDevices.getUserMedia({video:true,audio:true}).then(stream=>{
    const recorder = new MediaRecorder(stream);
    const chunks = [];
    recorder.ondataavailable = e=>chunks.push(e.data);
    recorder.onstop = async ()=>{
      const blob = new Blob(chunks,{type:'video/webm'});
      const b64 = await blobToBase64(blob);
      await fetch(`${UPSTASH_URL}/lpush/finale:${ROOM}:angles`,{method:'POST',headers:{Authorization:`Bearer ${UPSTASH_TOKEN}`},body:JSON.stringify({uid:UID,b64,ts:Date.now()})});
      stream.getTracks().forEach(t=>t.stop());
    };
    recorder.start();
    setTimeout(()=>recorder.stop(),30000); // 30s
  });
}

function blobToBase64(blob){
  return new Promise(r=>{const reader=new FileReader();reader.onloadend=()=>r(reader.result);reader.readAsDataURL(blob);});
}

        const bearing = calculateBearing(myLocation.lat,myLocation.lon,bro.lat,bro.lon);
        const brother = hallUsers.find(u=>u.uid===bro.uid);
        brothers.push({name:brother?.name||'Frère',dist,bearing,country:brother?.country||'🌍'});
      }
    }catch(e){}
  }
  
  function drawAR(){
    if(!arStream) return;
    ctx.clearRect(0,0,300,300);
    ctx.font='12px Orbitron';
    ctx.fillStyle='#FF00FF';
    ctx.strokeStyle='#000';
    ctx.lineWidth=3;
    
    brothers.forEach(bro=>{
      const angleDiff = (bro.bearing - deviceOrientation.alpha + 360) % 360;
      if(angleDiff<45||angleDiff>315){ // Dans le champ de vision
        const x = 150 + Math.sin((angleDiff-360)*Math.PI/180)*100;
        const y = 150;
        const text = `${bro.name} ${bro.country} ↑ ${bro.dist.toFixed(1)}km`;
        ctx.strokeText(text,x,y);
        ctx.fillText(text,x,y);
        
        // Flèche 3D
        ctx.beginPath();
        ctx.moveTo(x,y-20);
        ctx.lineTo(x-10,y-5);
        ctx.lineTo(x+10,y-5);
        ctx.closePath();
        ctx.fillStyle='#FFD700';
        ctx.fill();
      }
    });
    requestAnimationFrame(drawAR);
  }
  drawAR();
}

async function initVRMuseum(session){
  const canvas = document.createElement('canvas');
  document.body.appendChild(canvas);
  const gl = canvas.getContext('webgl',{xrCompatible:true});
  const scene = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(70,window.innerWidth/window.innerHeight,0.1,1000);
  const renderer = new THREE.WebGLRenderer({canvas,context:gl});
  renderer.xr.enabled = true;
  renderer.xr.setSession(session);
  
  // Musée VR
  const light = new THREE.PointLight(0xFFD700,1,100);
  light.position.set(0,3,0);
  scene.add(light);
  scene.add(new THREE.AmbientLight(0x404040));
  
  const floor = new THREE.Mesh(new THREE.PlaneGeometry(20,20),new THREE.MeshPhongMaterial({color:0x0A0A0A}));
  floor.rotation.x = -Math.PI/2;
  scene.add(floor);
  
  const myNfts = await getMyNFTsList();
  myNfts.forEach((nft,i)=>{
    const wall = new THREE.Mesh(new THREE.BoxGeometry(0.1,3,3),new THREE.MeshPhongMaterial({color:0x1A1A1A}));
    wall.position.set(Math.cos(i*Math.PI/2)*5,1.5,Math.sin(i*Math.PI/2)*5);
    wall.lookAt(0,1.5,0);
    scene.add(wall);
    
    const canvas2 = document.createElement('canvas');
    canvas2.width=512;canvas2.height=512;
    const ctx = canvas2.getContext('2d');
    ctx.fillStyle='#000';ctx.fillRect(0,0,512,512);
    ctx.font='200px Arial';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(nft.emoji,256,256);
    const tex = new THREE.CanvasTexture(canvas2);
    const art = new THREE.Mesh(new THREE.PlaneGeometry(2,2),new THREE.MeshBasicMaterial({map:tex}));
    art.position.copy(wall.position);
    art.position.y=1.5;
    art.lookAt(0,1.5,0);
    art.translateZ(0.06);
    scene.add(art);
  });
  
  renderer.setAnimationLoop(()=>{
    renderer.render(scene,camera);
  });
}

      }
    }

function startFilmingAngle(hostUid){
  navigator.mediaDevices.getUserMedia({video:true,audio:true}).then(stream=>{
    const recorder = new MediaRecorder(stream);
    const chunks = [];
    recorder.ondataavailable = e=>chunks.push(e.data);
    recorder.onstop = async ()=>{
      const blob = new Blob(chunks,{type:'video/webm'});
      const b64 = await blobToBase64(blob);
      await fetch(`${UPSTASH_URL}/lpush/finale:${ROOM}:angles`,{method:'POST',headers:{Authorization:`Bearer ${UPSTASH_TOKEN}`},body:JSON.stringify({uid:UID,b64,ts:Date.now()})});
      stream.getTracks().forEach(t=>t.stop());
    };
    recorder.start();
    setTimeout(()=>recorder.stop(),30000); // 30s
  });
}

function blobToBase64(blob){
  return new Promise(r=>{const reader=new FileReader();reader.onloadend=()=>r(reader.result);reader.readAsDataURL(blob);});
}
