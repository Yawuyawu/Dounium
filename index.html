<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<meta name="theme-color" content="#0A0A0A">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<title>DOUNUIM OS WORLD</title>
<link rel="manifest" href="data:application/json,{&quot;name&quot;:&quot;DOUNUIM WORLD&quot;,&quot;short_name&quot;:&quot;DOUNUIM&quot;,&quot;start_url&quot;:&quot;.&quot;,&quot;display&quot;:&quot;standalone&quot;,&quot;background_color&quot;:&quot;#0A0A0A&quot;,&quot;theme_color&quot;:&quot;#FFD700&quot;}">
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{background:#0A0A0A;color:#FFF;font-family:Orbitron,sans-serif;overflow:hidden;position:fixed;width:100%;height:100%}
.status-bar{position:fixed;top:0;left:0;right:0;height:32px;background:#1A1A1A;display:flex;align-items:center;padding:0 16px;font-size:12px;z-index:1000}
.status-left{font-weight:900;color:#FFD700}
.status-right{margin-left:auto;display:flex;gap:8px}
.world-indicator{position:fixed;top:32px;left:50%;transform:translateX(-50%);background:rgba(255,215,0,0.1);border:1px solid #FFD700;padding:4px 12px;border-radius:12px;font-size:10px;z-index:999}
.circles-scroll{position:fixed;top:60px;left:0;right:0;height:100px;overflow-x:auto;display:flex;gap:16px;padding:16px;z-index:900}
.circle-wrap{display:flex;flex-direction:column;align-items:center;gap:6px;min-width:70px;transition:all 0.3s}
.circle{width:60px;height:60px;border-radius:50%;border:3px solid #FFD700;background:#000;display:flex;align-items:center;justify-content:center;font-size:20px;position:relative}
.circle.pulse{animation:pulse 1.5s infinite;border-color:#00FF88}
.circle.you{border-color:#FF00FF;box-shadow:0 0 15px rgba(255,0,255,0.5)}
@keyframes pulse{0%,100%{transform:scale(1);box-shadow:0 0 0 0 rgba(0,255,136,0.7)}50%{transform:scale(1.1);box-shadow:0 0 20px 10px rgba(0,255,136,0)}}
.circle-name{font-size:9px;color:#FFF;max-width:70px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.circle-status{font-size:7px;color:rgba(255,255,255,0.5)}
.circle-flag{position:absolute;bottom:-2px;right:-2px;font-size:12px}
.hall{position:fixed;top:160px;bottom:80px;left:0;right:0;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:20px}
.hall-title{font-size:20px;font-weight:900;color:#FFD700;margin-bottom:8px}
.hall-status{font-size:12px;color:#00FF88}
.hall-count{font-size:11px;color:rgba(255,255,255,0.6);margin-top:6px}
.chat-defile{position:absolute;bottom:100px;left:0;right:0;height:60px;overflow:hidden}
.chat-msg{font-size:11px;padding:4px 16px;animation:slideUp 8s linear infinite}
@keyframes slideUp{0%{transform:translateY(60px);opacity:0}10%{opacity:1}90%{opacity:1}100%{transform:translateY(-60px);opacity:0}}
.bottom-bar{position:fixed;bottom:0;left:0;right:0;height:80px;background:#1A1A1A;display:flex;border-top:1px solid rgba(255,215,0,0.2);overflow-x:auto}
.bottom-btn{min-width:20%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;cursor:pointer;transition:all 0.2s}
.bottom-btn:active{background:rgba(255,215,0,0.1)}
.btn-icon{font-size:22px}
.btn-text{font-size:9px;color:rgba(255,255,255,0.8)}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.95);z-index:2000;display:none;align-items:center;justify-content:center;flex-direction:column;padding:20px}
.overlay.active{display:flex}
.overlay-title{font-size:24px;color:#FFD700;margin-bottom:20px;text-align:center}
.overlay-content{font-size:14px;color:#FFF;text-align:center;line-height:1.6;max-width:300px}
.breath-circle{width:200px;height:200px;border:4px solid #00FF88;border-radius:50%;animation:breath 4s ease-in-out infinite;margin:20px 0}
@keyframes breath{0%,100%{transform:scale(0.8)}50%{transform:scale(1.2)}}
.close-overlay{position:absolute;bottom:40px;background:rgba(255,255,255,0.1);border:1px solid #FFF;padding:12px 32px;border-radius:20px;color:#FFF}
.app-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:16px;margin:20px 0}
.app-card{background:rgba(255,215,0,0.1);border:1px solid #FFD700;padding:16px;border-radius:12px;text-align:center}
</style>
</head>
<body>
<div class="status-bar">
<div class="status-left">DOUNUIM WORLD</div>
<div class="status-right"><span id="time">14:32</span><span>🔋 87%</span><span>🌍</span></div>
</div>

<div class="world-indicator">🌍 HALL MONDIAL CONNECTÉ</div>
<div class="circles-scroll" id="circles"></div>

<div class="hall">
<div class="hall-title">HALL PLANÉTAIRE</div>
<div class="hall-status" id="hallStatus">Connexion...</div>
<div class="hall-count" id="hallCount">0 frère connecté</div>
<div class="chat-defile" id="chat"></div>
</div>

<div class="bottom-bar">
<div class="bottom-btn" onclick="openModule('RESPIR')"><div class="btn-icon">🫁</div><div class="btn-text">RESPIR</div></div>
<div class="bottom-btn" onclick="openModule('MEDIT')"><div class="btn-icon">🧘</div><div class="btn-text">MEDIT</div></div>
<div class="bottom-btn" onclick="openModule('SPORT')"><div class="btn-icon">🏃</div><div class="btn-text">SPORT</div></div>
<div class="bottom-btn" onclick="openModule('RESTO')"><div class="btn-icon">🍲</div><div class="btn-text">RESTO</div></div>
<div class="bottom-btn" onclick="openModule('MUSIC')"><div class="btn-icon">🎵</div><div class="btn-text">MUSIC</div></div>
<div class="bottom-btn" onclick="openModule('WALLET')"><div class="btn-icon">💰</div><div class="btn-text">WALLET</div></div>
<div class="bottom-btn" onclick="openModule('SOCIAL')"><div class="btn-icon">💬</div><div class="btn-text">SOCIAL</div></div>
<div class="bottom-btn" onclick="openModule('MAP')"><div class="btn-icon">🗺️</div><div class="btn-text">MAP</div></div>
<div class="bottom-btn" onclick="openModule('GAME')"><div class="btn-icon">🎮</div><div class="btn-text">GAME</div></div>
<div class="bottom-btn" onclick="openModule('IA')"><div class="btn-icon">🤖</div><div class="btn-text">IA</div></div>
</div>

<div class="overlay" id="overlay">
<div class="overlay-title" id="overlayTitle"></div>
<div class="breath-circle" id="breathCircle" style="display:none"></div>
<div class="overlay-content" id="overlayContent"></div>
<button class="close-overlay" onclick="closeOverlay()">⬇️ RETOUR HALL</button>
</div>

<script>
const UPSTASH_URL='https://golden-sturgeon-78265.upstash.io';
const UPSTASH_TOKEN='gQAAAAAAATG5AAIgcDIwMTg0YzNlYzBiOGE0MDEyODBkNTRmMTA4ZDhlYWRjNw';
const ROOM='WORLD';
const UID='user_'+Math.random().toString(36).slice(2,9);
const USERNAME = localStorage.getItem('dounium_name') || prompt('Ton nom dans le Hall Mondial:') || 'Anonyme';
localStorage.setItem('dounium_name', USERNAME);

let micStream, analyser, audioCtx, mySpeaking=false, lastSync=0, hallUsers=[];
let userCountry = '🌍';

const APPS = {
RESPIR: {title:'🫁 RESPIRATION 6D', content:'Inspire 4s • Bloque 4s • Expire 4s<br>Cercle = tes poumons', breath:true},
MEDIT: {title:'🧘 MÉDITATION PLANÉTAIRE', content:'Ferme les yeux<br>Écoute les frères du monde<br>Silence partagé = force'},
SPORT: {title:'🏃 WORKOUT MONDIAL', content:'20 Pompes<br>30 Squats<br>1min Gainage<br>Score sync mondial'},
RESTO: {title:'🍲 RECETTES DU MONDE', content:'Thieb Sénégal 🇸🇳<br>Tajine Maroc 🇲🇦<br>Couscous Algérie 🇩🇿<br>Sang réel cuisine'},
MUSIC: {title:'🎵 RADIO DOUNIUM', content:'Lo-fi Sénégal<br>Trap Bamako<br>Amapiano Lagos<br>Live 24/7 Mondial'},
WALLET: {title:'💰 WALLET DOUNIUM', content:'0 DOUNUIM Coin<br>Send • Receive • Stack<br>Bientôt: P2P frères', coming:true},
SOCIAL: {title:'💬 SOCIAL HALL', content:'Poste vocal 8s<br>Réagis ❤️🔥<br>Stories 24h<br>Tout reste dans le Hall'},
MAP: {title:'🗺️ MAP FRÈRES', content:'Voir frères connectés<br>🌍 Globe live<br>Ping un frère proche', coming:true},
GAME: {title:'🎮 DOUNIUM GAMES', content:'Wati Puzzle<br>Course Dakar<br>Rap Battle Live<br>Leaderboard mondial', coming:true},
IA: {title:'🤖 IA DOUNIUM WORLD', content:'Assistant Hall<br>Traducteur 100 langues<br>Coach vie<br>Parle dans le micro'}
};

async function init(){
updateTime();
setInterval(updateTime,1000);
await detectCountry();
await initAudio();
setInterval(syncHall,1000);
setInterval(cleanupOld,5000);
startChat();
}

async function detectCountry(){
try{
const r = await fetch('https://ipapi.co/json/');
const d = await r.json();
userCountry = d.country_code? String.fromCodePoint(...d.country_code.toUpperCase().split('').map(c=>127397+c.charCodeAt())) : '🌍';
}catch(e){}
}

function updateTime(){
document.getElementById('time').textContent=new Date().toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'});
}

async function initAudio(){
try{
micStream = await navigator.mediaDevices.getUserMedia({audio:{echoCancellation:true,noiseSuppression:true,autoGainControl:true}});
audioCtx = new AudioContext();
analyser = audioCtx.createAnalyser();
analyser.fftSize = 256;
audioCtx.createMediaStreamSource(micStream).connect(analyser);
document.getElementById('hallStatus').textContent='Connecté au Hall Mondial';
detectSpeaking();
}catch(e){
document.getElementById('hallStatus').textContent='Micro refusé - Mode spectateur';
sendHeartbeat(false);
}
}

function detectSpeaking(){
if(!analyser) return;
const data = new Uint8Array(analyser.frequencyBinCount);
requestAnimationFrame(function loop(){
analyser.getByteFrequencyData(data);
const vol = data.reduce((a,b)=>a+b)/data.length;
const speaking = vol > 12;
if(speaking!== mySpeaking || Date.now()-lastSync>2000){
mySpeaking = speaking;
lastSync = Date.now();
sendHeartbeat(speaking);
}
requestAnimationFrame(loop);
});
}

async function sendHeartbeat(speaking){
const userData = JSON.stringify({name:USERNAME,speaking,ts:Date.now(),uid:UID,country:userCountry});
await fetch(`${UPSTASH_URL}/hset/room:${ROOM}/${UID}`,{
method:'POST',
headers:{Authorization:`Bearer ${UPSTASH_TOKEN}`},
body:userData
});
await fetch(`${UPSTASH_URL}/expire/room:${ROOM}/60`,{
headers:{Authorization:`Bearer ${UPSTASH_TOKEN}`}
});
}

async function syncHall(){
const r = await fetch(`${UPSTASH_URL}/hgetall/room:${ROOM}`,{
headers:{Authorization:`Bearer ${UPSTASH_TOKEN}`}
});
const data = await r.json();
const raw = data.result || [];
hallUsers = [];
for(let i=0;i<raw.length;i+=2){
const id=raw[i];
try{
const user=JSON.parse(raw[i+1]);
if(Date.now()-user.ts<15000) hallUsers.push({id,...user});
}catch(e){}
}
hallUsers.sort((a,b)=>b.speaking-a.speaking || b.ts-a.ts);
renderCircles();
document.getElementById('hallCount').textContent = `${hallUsers.length} frère${hallUsers.length>1?'s':''} connecté${hallUsers.length>1?'s':''}`;
}

async function cleanupOld(){
await fetch(`${UPSTASH_URL}/eval`,{
method:'POST',
headers:{Authorization:`Bearer ${UPSTASH_TOKEN}`,'Content-Type':'application/json'},
body:JSON.stringify({
script:"for i,v in ipairs(redis.call('HKEYS',KEYS[1])) do local u=cjson.decode(redis.call('HGET',KEYS[1],v)) if u.ts<ARGV[1] then redis.call('HDEL',KEYS[1],v) end end",
keys:[`room:${ROOM}`],
args:[Date.now()-15000]
})
});
}

function renderCircles(){
const c=document.getElementById('circles');
if(!hallUsers.length){
c.innerHTML=`<div class="circle-wrap"><div class="circle">🌑</div><div class="circle-name">Hall vide</div><div class="circle-status">Sois le premier</div></div>`;
return;
}
c.innerHTML=hallUsers.map(u=>`
<div class="circle-wrap">
<div class="circle ${u.speaking?'pulse':''} ${u.uid===UID?'you':''}">${u.name[0]||'?'}</div>
<div class="circle-name">● ${u.uid===UID?'Toi':u.name}</div>
<div class="circle-status">${u.speaking?'Live':'Idle'}</div>
<div class="circle-flag">${u.country||'🌍'}</div>
</div>
`).join('');
}

function startChat(){
const msgs = [
'🌍 Hall Mondial actif',
'🫁 Respire avec tes frères',
'🎵 Radio Dounium live',
'💰 Wallet arrive bientôt',
'🔥 Sang réel connecte'
];
let i=0;
setInterval(()=>{
document.getElementById('chat').innerHTML=`<div class="chat-msg">${msgs[i%msgs.length]}</div>`;
i++;
},4000);
}

function openModule(type){
const o=document.getElementById('overlay');
const t=document.getElementById('overlayTitle');
const c=document.getElementById('overlayContent');
const b=document.getElementById('breathCircle');
const app = APPS[type];
o.classList.add('active');
t.textContent = app.title;
c.innerHTML = app.content + (app.coming?'<br><br><b>🚀 Bientôt disponible</b>':'');
b.style.display = app.breath? 'block' : 'none';
if(app.breath) navigator.vibrate&&navigator.vibrate([200,100,200]);
document.getElementById('hallStatus').textContent=type+' - Actif';
}

function closeOverlay(){
document.getElementById('overlay').classList.remove('active');
document.getElementById('hallStatus').textContent='Connecté au Hall Mondial';
}

document.addEventListener('keydown',e=>{if(e.key==='Escape')closeOverlay()});
init();
</script>
</body>
</html>
