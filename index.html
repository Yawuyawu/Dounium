<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Dounium V19.0 SUPER SMART TV 8D</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap');
:root{--gold:#FFD700;--neon:#00FF88;--tesla-red:#E31937;--blue-8k:#00BFFF}
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;color:#FFF;font-family:Orbitron,sans-serif;overflow:hidden;cursor:none}
.tv-glow{position:fixed;inset:0;background:radial-gradient(circle at center,rgba(0,191,255,0.1),transparent 70%);pointer-events:none;z-index:1}
.launcher{position:fixed;inset:0;display:grid;grid-template-columns:repeat(4,1fr);gap:20px;padding:40px;background:linear-gradient(135deg,#000,#0A0A1A);z-index:10}
.app-tile{background:rgba(255,255,255,0.05);border:1px solid rgba(255,215,0,0.2);border-radius:24px;padding:20px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:all 0.3s;backdrop-filter:blur(20px)}
.app-tile:hover{background:rgba(255,215,0,0.1);transform:scale(1.05);box-shadow:0 0 40px rgba(255,215,0,0.3)}
.app-icon{font-size:48px;margin-bottom:12px}
.app-name{font-size:14px;font-weight:700;text-align:center}
.status-bar{position:fixed;top:0;left:0;right:0;height:60px;background:rgba(0,0,0,0.8);backdrop-filter:blur(30px);display:flex;align-items:center;justify-content:space-between;padding:0 40px;z-index:100}
.logo-tv{display:flex;align-items:center;gap:12px}
.logo-icon{width:40px;height:40px;background:linear-gradient(135deg,var(--gold),var(--blue-8k));border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;box-shadow:0 0 30px var(--blue-8k)}
.time-weather{display:flex;gap:20px;font-size:14px}
.modal{position:fixed;inset:0;background:#000;z-index:200;display:none}
.modal.active{display:block}
video{width:100%;height:100vh;object-fit:contain;background:#000}
.video-ui{position:absolute;bottom:0;left:0;right:0;background:linear-gradient(transparent,rgba(0,0,0,0.9));padding:40px;opacity:0;transition:opacity 0.3s}
.modal:hover.video-ui{opacity:1}
.progress-bar{width:100%;height:6px;background:rgba(255,255,255,0.2);border-radius:3px;margin-bottom:20px;cursor:pointer}
.progress-fill{height:100%;background:var(--gold);border-radius:3px;width:0%}
.controls{display:flex;align-items:center;gap:20px}
.ctrl-btn{background:rgba(255,255,255,0.1);border:none;width:50px;height:50px;border-radius:50%;color:#FFF;font-size:20px;cursor:pointer}
.browser-frame{width:100%;height:calc(100vh - 60px);border:none;background:#FFF}
.codec-badge{position:absolute;top:80px;right:40px;background:rgba(0,191,255,0.2);border:1px solid var(--blue-8k);padding:8px 16px;border-radius:12px;font-size:12px}
.usb-input{display:none}
.remote-cursor{position:fixed;width:20px;height:20px;border:2px solid var(--gold);border-radius:50%;pointer-events:none;z-index:9999;box-shadow:0 0 20px var(--gold)}
</style>
</head>
<body>
<div class="tv-glow"></div>
<div class="remote-cursor" id="cursor"></div>

<div class="status-bar">
<div class="logo-tv">
<div class="logo-icon">⚜️</div>
<div style="font-size:20px;font-weight:900">DOUNIUM TV 8D</div>
</div>
<div class="time-weather">
<div id="clock">12:00</div>
<div id="weather">☀️ 22°C London</div>
<div>● UPSTASH LIVE</div>
</div>

<div class="launcher" id="launcher">
<div class="app-tile" onclick="openPlayer()">
<div class="app-icon">🎬</div>
<div class="app-name">PLAYER MP4<br>H.265 + AV1 8K</div>
</div>
<div class="app-tile" onclick="openBrowser()">
<div class="app-icon">🌐</div>
<div class="app-name">BROWSER 8D<br>Chromium 120</div>
</div>
<div class="app-tile" onclick="openBank()">
<div class="app-icon">🏦</div>
<div class="app-name">DOUNIUM BANK<br>Cloud Ledger</div>
<div class="app-tile" onclick="openSocial()">
<div class="app-icon">⚜️</div>
<div class="app-name">SOCIAL 8D<br>Feed + Stories</div>
<div class="app-tile" onclick="openGaming()">
<div class="app-icon">🎮</div>
<div class="app-name">GAMING HUB<br>144Hz VRR</div>
</div>
<div class="app-tile" onclick="openAI()">
<div class="app-icon">🧠</div>
<div class="app-name">IA UPSCALE<br>NQ8 Gen3</div>
<div class="app-tile" onclick="openUSB()">
<div class="app-icon">💾</div>
<div class="app-name">USB 3.0<br>Mount Drive</div>
<div class="app-tile" onclick="openSettings()">
<div class="app-icon">⚙️</div>
<div class="app-name">SETTINGS<br>Matter/Thread</div>
</div>

<div class="modal" id="player-modal">
<div class="codec-badge" id="codec-info">Codec: --</div>
<video id="video-player"></video>
<div class="video-ui">
<div class="progress-bar" onclick="seekVideo(event)"><div class="progress-fill" id="progress"></div></div>
<div class="controls">
<button class="ctrl-btn" onclick="togglePlay()">⏯️</button>
<button class="ctrl-btn" onclick="seek(-10)">⏪</button>
<button class="ctrl-btn" onclick="seek(10)">⏩</button>
<button class="ctrl-btn" onclick="toggleAI()">🧠</button>
<button class="ctrl-btn" onclick="closeModal()">❌</button>
<div style="flex:1"></div>
<div id="video-time">00:00 / 00:00</div>
</div>
<input type="file" id="usb-input" class="usb-input" accept="video/mp4,video/*" onchange="loadVideo(this)">
</div>

<div class="modal" id="browser-modal">
<iframe id="browser-frame" class="browser-frame" src="https://dounium.vercel.app"></iframe>
<button class="ctrl-btn" style="position:absolute;top:80px;right:40px" onclick="closeModal()">❌</button>
</div>

<div class="modal" id="bank-modal">
<iframe class="browser-frame" src="https://dounium.vercel.app" style="margin-top:60px"></iframe>
<button class="ctrl-btn" style="position:absolute;top:80px;right:40px" onclick="closeModal()">❌</button>
</div>

<script>
const UPSTASH_URL="https://golden-sturgeon-78265.upstash.io";
const UPSTASH_TOKEN="gQAAAAAAATG5AAIgcDIwMTg0YzNlYzBiOGE0MDEyODBkNTRmMTA4ZDhlYWRjNw";
let aiUpscale=false;

// Clock
setInterval(()=>{
document.getElementById('clock').textContent=new Date().toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'});
},1000);

// Remote cursor simulation
document.addEventListener('mousemove',e=>{
document.getElementById('cursor').style.left=e.clientX+'px';
document.getElementById('cursor').style.top=e.clientY+'px';
});

// TV Apps
function openPlayer(){document.getElementById('usb-input').click()}
function openBrowser(){document.getElementById('browser-modal').classList.add('active')}
function openBank(){document.getElementById('bank-modal').classList.add('active')}
function openSocial(){openBrowser()}
function openGaming(){alert('🎮 Gaming Hub 144Hz VRR\nGeForce Now + Xbox Cloud\nBranch manette Bluetooth')}
function openAI(){aiUpscale=!aiUpscale;alert('🧠 IA Upscale '+(aiUpscale?'ON':'OFF')+'\nNQ8 AI Gen3: 4K→8K + Denoise')}
function openUSB(){document.getElementById('usb-input').click()}
function openSettings(){alert('⚙️ Matter/Thread Domotique\nWiFi 7 + Bluetooth 5.4\nHDR10+ / Dolby Vision / DTS:X')}
function closeModal(){document.querySelectorAll('.modal').forEach(m=>m.classList.remove('active'))}

// Video Player 8K
const player=document.getElementById('video-player');
function loadVideo(input){
const file=input.files[0];
if(!file)return;
const url=URL.createObjectURL(file);
player.src=url;
document.getElementById('player-modal').classList.add('active');
player.play();
detectCodec(file);
}
function detectCodec(file){
const v=document.createElement('video');
v.src=URL.createObjectURL(file);
v.onloadedmetadata=()=>{
let codec='H.264';
if(file.name.includes('265')||file.name.includes('HEVC'))codec='H.265/HEVC';
if(file.name.includes('AV1'))codec='AV1';
document.getElementById('codec-info').textContent=`Codec: ${codec} | ${v.videoWidth}x${v.videoHeight} | ${Math.round(file.size/1e6)}MB`;
};
}
function togglePlay(){player.paused?player.play():player.pause()}
function seek(s){player.currentTime+=s}
function seekVideo(e){
const rect=e.currentTarget.getBoundingClientRect();
const pos=(e.clientX-rect.left)/rect.width;
player.currentTime=pos*player.duration;
}
player.ontimeupdate=()=>{
const p=(player.currentTime/player.duration)*100;
document.getElementById('progress').style.width=p+'%';
document.getElementById('video-time').textContent=formatTime(player.currentTime)+' / '+formatTime(player.duration);
};
function formatTime(s){return new Date(s*1000).toISOString().substr(14,5)}
function toggleAI(){
aiUpscale=!aiUpscale;
player.style.filter=aiUpscale?'contrast(1.1) saturate(1.2) brightness(1.05)':'none';
alert('🧠 NQ8 AI '+(aiUpscale?'ON: Upscale 8K + Denoise':'OFF'));
}

// Keyboard Remote
document.addEventListener('keydown',e=>{
if(e.key==='Escape')closeModal();
if(e.key===' ')togglePlay();
if(e.key==='ArrowLeft')seek(-10);
if(e.key==='ArrowRight')seek(10);
if(e.key==='b'||e.key==='B')openBrowser();
});

// Auto-hide cursor
let timeout;
document.addEventListener('mousemove',()=>{
document.body.style.cursor='none';
clearTimeout(timeout);
timeout=setTimeout(()=>document.body.style.cursor='none',3000);
});
</script>
</body>
</html>
