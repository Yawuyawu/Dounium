<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dounium</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-black text-white">
<div id="app">
  <div id="feed"></div>
</div>

<script>
const posts = [
  {
    id: 1,
    username: "Yawu",
    avatar: "https://i.pravatar.cc/150?u=yawu",
    content: "Premier post Dounium ⚜️🔥"
  },
  {
    id: 2, 
    username: "TestUser",
    avatar: undefined,
    content: "Post sans avatar test"
  }
];

function renderPosts() {
  const feed = document.getElementById('feed');
  feed.innerHTML = posts.map(post => `
    <div class="border-b border-gray-800 p-4">
      <div class="flex items-center gap-3 mb-2">
        <img 
          src="${post.avatar || 'https://ui-avatars.com/api/?name=' + encodeURIComponent(post.username || 'User') + '&background=8b5cf6&color=fff'}" 
          onerror="this.src='https://ui-avatars.com/api/?name=' + encodeURIComponent('${post.username || 'User'}') + '&background=8b5cf6&color=fff'"
          class="w-10 h-10 rounded-full"
          alt="${post.username}"
        >
        <span class="font-bold">${post.username}</span>
      </div>
      <p>${post.content}</p>
    </div>
  `).join('');
}

renderPosts();
</script>
</body>
</html>
